name: ETF Stock Data
on:
  workflow_dispatch:
  workflow_call:
    outputs:
      result:
        description: "ETF行情"
        value: ${{ jobs.fetch.outputs.result }}
jobs:
  fetch:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.fetch.outputs.result }}
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests yfinance --break-system-packages
      - name: ETF Stock Data
        id: fetch
        run: |
          python3 - << 'EOF'
          import requests, os
          from datetime import datetime, timezone, timedelta
          import yfinance as yf
          ETFS = [
              ('510500', '中证500ETF',  '510500.SS'),
              ('510300', '沪深300ETF',  '510300.SS'),
              ('513100', '纳斯达克ETF', '513100.SS'),
              ('513500', '标普500ETF',  '513500.SS'),
          ]
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Referer': 'https://finance.sina.com.cn'
          }
          def get_realtime(code):
              try:
                  r = requests.get(f"https://hq.sinajs.cn/list=sh{code}", headers=headers, timeout=10)
                  r.encoding = 'gbk'
                  data_str = r.text.split('"')[1]
                  if not data_str: return None
                  f          = data_str.split(',')
                  prev_close = float(f[2])
                  current    = float(f[3])
                  if current == 0:
                      bid = float(f[6]) if len(f) > 6 else 0
                      current = bid if bid > 0 else prev_close
                  if prev_close == 0: return None
                  return {
                      'current':    current,
                      'change_pct': (current - prev_close) / prev_close * 100,
                  }
              except:
                  return None
          def get_history_high(yahoo_symbol):
              try:
                  hist = yf.Ticker(yahoo_symbol).history(period='max')
                  if hist.empty: return None
                  return hist['High'].max()
              except:
                  return None
          def get_gold_price():
              """获取黄金现货价格（美元/盎司），转换为人民币/克"""
              try:
                  # GC=F 为 COMEX 黄金期货，XAU=X 为现货
                  ticker = yf.Ticker('GC=F')
                  hist = ticker.history(period='2d')
                  if hist.empty: return None, None
                  usd_per_oz = hist['Close'].iloc[-1]
                  prev_oz    = hist['Close'].iloc[-2] if len(hist) >= 2 else usd_per_oz
                  # 获取美元兑人民币汇率
                  fx = yf.Ticker('CNY=X').history(period='2d')
                  rate = fx['Close'].iloc[-1] if not fx.empty else 7.1
                  # 1 盎司 = 31.1035 克
                  cny_per_gram = usd_per_oz * rate / 31.1035
                  change_pct   = (usd_per_oz - prev_oz) / prev_oz * 100 if prev_oz else 0
                  return round(cny_per_gram, 2), change_pct
              except:
                  return None, None
          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M')
          lines = [f'### 📊 ETF 行情  {now}\n']
          lines.append('| ETF | 现价 | 较前日 | 历史最高 | 现价/最高 |')
          lines.append('|:---|:---:|:---:|:---:|:---:|')
          for code, label, yahoo in ETFS:
              d    = get_realtime(code)
              high = get_history_high(yahoo)
              if d:
                  arrow = '↑' if d['change_pct'] >= 0 else '↓'
                  sign  = '+' if d['change_pct'] >= 0 else ''
                  cur   = f"{d['current']:.3f}"
                  pct   = f"{arrow}{sign}{d['change_pct']:.2f}%"
                  h_str = f"{high:.3f}" if high else 'N/A'
                  ratio = f"{d['current']/high*100:.1f}%" if high else 'N/A'
                  lines.append(f"| {label} | {cur} | {pct} | {h_str} | {ratio} |")
              else:
                  lines.append(f"| {label} | N/A | N/A | N/A | N/A |")
          # 黄金克价
          gold_cny, gold_chg = get_gold_price()
          if gold_cny:
              arrow = '↑' if gold_chg >= 0 else '↓'
              sign  = '+' if gold_chg >= 0 else ''
              lines.append(f"| 🥇 黄金 | ¥{gold_cny}/克 | {arrow}{sign}{gold_chg:.2f}% | - | - |")
          else:
              lines.append(f"| 🥇 黄金 | N/A | N/A | - | - |")
          result = '\n'.join(lines)
          print(result)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"result<<ENDSTOCK\n{result}\nENDSTOCK\n")
          EOF
