name: Daily Checkin All

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00（北京时间 08:00）触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    # 移除了 environment: user，避免需要手动审批导致不执行

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # - name: Random Delay (北京时间 08:00~09:00)
      #   run: |
      #     delay=$((RANDOM % 3600))
      #     echo "随机等待 ${delay} 秒（约 $((delay/60)) 分钟）"
      #     sleep $delay

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install requests dailycheckin yfinance --break-system-packages
          npm install axios

      # ─────────────────────────────────────────
      # 1. Bilibili
      # ─────────────────────────────────────────
      - name: Bilibili Checkin
        id: bilibili
        env:
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
        run: |
          python3 - << 'EOF'
          import os, requests, time, sys

          cookie = os.environ.get('BILIBILI_COOKIE', '')
          if not cookie:
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write("BILIBILI_RESULT=📺 Bilibili\n❌ 签到失败: 未设置 BILIBILI_COOKIE\n")
              sys.exit(0)

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Cookie': cookie,
              'Referer': 'https://www.bilibili.com/'
          }

          def get_csrf():
              for item in cookie.split(';'):
                  if 'bili_jct' in item:
                      return item.split('=')[1].strip()
              return ''

          lines = ['📺 Bilibili']

          try:
              r = requests.get('https://api.bilibili.com/x/web-interface/nav', headers=headers, timeout=10)
              d = r.json()
              if d['code'] == 0:
                  lines.append(f"用户: {d['data']['uname']}")
              else:
                  lines.append("❌ 签到失败: Cookie 失效")
                  result = '\n'.join(lines)
                  with open(os.environ['GITHUB_ENV'], 'a') as f:
                      f.write(f"BILIBILI_RESULT<<ENDBILIBILI\n{result}\nENDBILIBILI\n")
                  sys.exit(0)
          except Exception as e:
              lines.append(f"❌ 签到失败: {e}")
              result = '\n'.join(lines)
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f"BILIBILI_RESULT<<ENDBILIBILI\n{result}\nENDBILIBILI\n")
              sys.exit(0)

          lines.append("✅ 签到成功")

          videos = []
          try:
              r = requests.get('https://api.bilibili.com/x/web-interface/index/top/rcmd',
                               headers=headers, params={'fresh_type': 3, 'ps': 10}, timeout=10)
              d = r.json()
              if d['code'] == 0:
                  videos = [item['id'] for item in d['data']['item'] if 'id' in item][:5]
          except: pass

          if videos:
              try:
                  r = requests.get(f'https://api.bilibili.com/x/web-interface/view?aid={videos[0]}',
                                   headers=headers, timeout=10)
                  d = r.json()
                  if d['code'] == 0:
                      cid = d['data']['cid']
                      requests.post('https://api.bilibili.com/x/click-interface/web/heartbeat',
                                    headers=headers,
                                    data={'aid': videos[0], 'cid': cid, 'played_time': 60, 'csrf': get_csrf()},
                                    timeout=10)
                      lines.append("✅ 观看视频成功")
              except Exception as e:
                  lines.append(f"⚠️ 观看视频异常: {e}")

              coin_ok = 0
              for aid in videos[:2]:
                  try:
                      r = requests.post('https://api.bilibili.com/x/web-interface/coin/add',
                                        headers=headers,
                                        data={'aid': aid, 'multiply': 1, 'select_like': 1,
                                              'cross_domain': 'true', 'csrf': get_csrf()},
                                        timeout=10)
                      if r.json().get('code') == 0:
                          coin_ok += 1
                      time.sleep(2)
                  except: pass
              lines.append(f"✅ 投币成功: {coin_ok} 枚")

              try:
                  r = requests.post('https://api.bilibili.com/x/web-interface/share/add',
                                    headers=headers,
                                    data={'aid': videos[0], 'csrf': get_csrf()},
                                    timeout=10)
                  if r.json().get('code') == 0:
                      lines.append("✅ 分享视频成功")
              except: pass

          result = '\n'.join(lines)
          print(result)
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"BILIBILI_RESULT<<ENDBILIBILI\n{result}\nENDBILIBILI\n")
          EOF

      # ─────────────────────────────────────────
      # 2. 掘金
      # ─────────────────────────────────────────
      - name: Juejin Checkin
        id: juejin
        env:
          JUEJIN_COOKIES: ${{ secrets.JUEJIN_COOKIES }}
        run: |
          cat > juejin_task.js << 'EOF'
          const axios = require('axios');
          const fs = require('fs');

          const cookies = process.env.JUEJIN_COOKIES ? process.env.JUEJIN_COOKIES.split('#') : [];
          const AID_APP = "1931", AID_WEB = "2608";
          const generateUUID = () => "71439" + Math.floor(Math.random() * 1000000000);

          async function executeTask(cookie) {
            const uuid = generateUUID();
            const APP_PARAMS = `?aid=${AID_APP}&uuid=${uuid}&app_name=juejin_sdk&device_platform=android`;
            const WEB_PARAMS = `?aid=${AID_WEB}&uuid=${uuid}`;
            const api = axios.create({
              baseURL: 'https://api.juejin.cn', timeout: 15000,
              headers: {
                'Cookie': cookie,
                'User-Agent': 'Mozilla/5.0 (Linux; Android 12; SM-G991B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Mobile Safari/537.36 Juejin/Android/6.0.1',
                'Content-Type': 'application/json'
              }
            });
            let report = ['🪙 掘金'];
            try {
              const userRes = await api.get("/user_api/v1/user/get" + WEB_PARAMS);
              report.push("用户: " + (userRes.data?.data?.user_name || "未知"));

              const ck = await api.post("/growth_api/v1/check_in" + APP_PARAMS, {});
              if (ck.data?.err_no === 0) {
                report.push("✅ 签到成功: +" + ck.data.data.incr_point + " 矿石");
              } else if (ck.data?.err_no === 20001 || ck.data?.err_msg?.includes("已完成")) {
                report.push("ℹ️ 今日已签到");
              } else {
                report.push("❌ 签到失败: " + (ck.data?.err_msg || "未知错误"));
              }

              try {
                const history = await api.post("/growth_api/v1/lottery_history/global_big" + WEB_PARAMS, { page_no: 1, page_size: 5 });
                const luckyId = history.data?.data?.lotteries?.[0]?.history_id || "7143943034230636551";
                const dip = await api.post("/growth_api/v1/lottery_lucky/dip_lucky" + APP_PARAMS, { lottery_history_id: luckyId });
                if (dip.data?.err_no === 0) {
                  report.push("✅ 沾喜气成功: +" + dip.data.data.dip_value + " 幸运值");
                } else {
                  report.push("ℹ️ 沾喜气: 今日已沾");
                }
              } catch { report.push("⚠️ 沾喜气异常"); }

              const cfg = await api.get("/growth_api/v1/lottery_config/get" + APP_PARAMS);
              if (cfg.data?.data?.free_count > 0) {
                const draw = await api.post("/growth_api/v1/lottery/draw" + APP_PARAMS, {});
                if (draw.data?.err_no === 0) {
                  report.push("✅ 抽奖成功: " + draw.data.data.lottery_name);
                } else {
                  report.push("❌ 抽奖失败");
                }
              } else {
                report.push("ℹ️ 今日无免费抽奖");
              }

              const counts = await api.get("/growth_api/v1/get_counts" + WEB_PARAMS);
              const pts = await api.get("/growth_api/v1/get_cur_point" + WEB_PARAMS);
              if (counts.data?.data) {
                report.push(`连续签到: ${counts.data.data.cont_count} 天 | 累计: ${counts.data.data.sum_count} 天`);
              }
              if (pts.data) report.push("当前矿石: " + pts.data.data);
            } catch(e) {
              report.push("⚠️ 异常: " + e.message);
            }
            return report.join('\n');
          }

          async function main() {
            if (!cookies.length) {
              fs.appendFileSync(process.env.GITHUB_ENV, "JUEJIN_RESULT=🪙 掘金\n❌ 签到失败: 未设置 JUEJIN_COOKIES\n");
              return;
            }
            let all = [];
            for (let i = 0; i < cookies.length; i++) all.push(await executeTask(cookies[i]));
            const result = all.join('\n----------\n');
            console.log(result);
            fs.appendFileSync(process.env.GITHUB_ENV, `JUEJIN_RESULT<<ENDJUEJIN\n${result}\nENDJUEJIN\n`);
          }
          main();
          EOF
          node juejin_task.js

      # ─────────────────────────────────────────
      # 3. 百度网盘
      # ─────────────────────────────────────────
      - name: Baidu Netdisk Checkin
        id: baidu
        env:
          BAIDUWP_COOKIE: ${{ secrets.BAIDUWP_COOKIE }}
        run: |
          python3 - << 'EOF'
          import os, json, subprocess, sys

          cookie = os.environ.get('BAIDUWP_COOKIE', '')
          if not cookie:
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write("BAIDU_RESULT=☁️ 百度网盘\n❌ 签到失败: 未设置 BAIDUWP_COOKIE\n")
              sys.exit(0)

          try:
              with open('config.json', 'r') as f:
                  config = json.load(f)
              config['BAIDUWP'][0]['cookie'] = cookie
              with open('config.json', 'w') as f:
                  json.dump(config, f)
          except Exception:
              config = {"BAIDUWP": [{"cookie": cookie}]}
              with open('config.json', 'w') as f:
                  json.dump(config, f)

          proc = subprocess.run(['dailycheckin'], capture_output=True, text=True)
          output = proc.stdout + proc.stderr

          keep = []
          for line in output.splitlines():
              line = line.strip()
              if not line: continue
              if any(x in line for x in ['当前时间', '当前版本', '使用配置', '本次执行', '账号数', '开始执行', '---']): continue
              keep.append(line)

          joined = '\n'.join(keep)
          status = '✅ 签到成功' if '✅' in joined else ('❌ 签到失败' if 'fail' in joined.lower() or '失败' in joined else 'ℹ️ 今日已签到')

          lines = ['☁️ 百度网盘', status] + (keep if keep else [])
          result = '\n'.join(lines)
          print(result)
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"BAIDU_RESULT<<ENDBAIDU\n{result}\nENDBAIDU\n")
          EOF

      # ─────────────────────────────────────────
      # 4. 京东 (修复状态判断)
      # ─────────────────────────────────────────
      - name: JD Checkin
        id: jd
        env:
          JD_COOKIE: ${{ secrets.JD_COOKIE }}
        run: |
          cat > jd_sign.js << 'EOF'
          const axios = require('axios');
          const fs = require('fs');

          const cookie = process.env.JD_COOKIE;
          if (!cookie) {
            fs.appendFileSync(process.env.GITHUB_ENV, "JD_RESULT=🛒 京东\n❌ 签到失败: 未设置 JD_COOKIE\n");
            process.exit(0);
          }

          async function sign() {
            let lines = ['🛒 京东'];
            try {
              const res = await axios.post(
                'https://api.m.jd.com/client.action',
                'functionId=signBeanAct&appid=ld&body=%7B%22rnVersion%22%3A%228.1.0%22%2C%22channel%22%3A1%2C%22os%22%3A%22apple%22%2C%22enAli%22%3A%221%22%7D',
                {
                  headers: {
                    'Cookie': cookie,
                    'User-Agent': 'JDMobileIOS/13.0.2 (iPhone; iOS 16.0; Scale/3.00)',
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'Referer': 'https://bean.m.jd.com/',
                    'Host': 'api.m.jd.com'
                  }
                }
              );
              const d = res.data?.data;
              // 修复: status 是字符串 "1" 表示签到成功
              if (d?.status === "1" || d?.status === 1) {
                const beans = d.dailyAward?.beanAward?.beanCount || d.signInfo?.signScore || 0;
                lines.push("✅ 签到成功: +" + beans + " 京豆");
                if (d.continuousDays) lines.push("连续签到: " + d.continuousDays + " 天");
              } else if (d?.status === "2" || d?.status === 2) {
                lines.push("ℹ️ 今日已签到");
              } else if (d?.status === "3" || d?.status === 3) {
                lines.push("❌ 签到失败: Cookie 已过期");
              } else {
                lines.push("⚠️ 未知状态: " + (d?.status || 'null'));
              }
            } catch(e) {
              lines.push("❌ 签到失败: " + e.message);
            }
            const result = lines.join('\n');
            console.log(result);
            fs.appendFileSync(process.env.GITHUB_ENV, `JD_RESULT<<ENDJD\n${result}\nENDJD\n`);
          }
          sign();
          EOF
          node jd_sign.js

      # ─────────────────────────────────────────
      # 5. Epic 免费游戏
      # ─────────────────────────────────────────
      - name: Epic Free Games
        id: epic
        run: |
          python3 - << 'EOF'
          import requests, os
          from datetime import datetime, timezone

          lines = ['🎮 Epic 本周免费游戏']

          try:
              url = 'https://store-site-backend-static.ak.epicgames.com/freeGamesPromotions?locale=zh-CN&country=CN&allowCountries=CN'
              r = requests.get(url, timeout=15)
              games = r.json()['data']['Catalog']['searchStore']['elements']

              free_now, free_next = [], []
              for game in games:
                  title = game.get('title', '未知游戏')
                  promos = game.get('promotions')
                  if not promos: continue
                  for offer in promos.get('promotionalOffers', []):
                      for detail in offer.get('promotionalOffers', []):
                          if detail.get('discountSetting', {}).get('discountPercentage', 99) == 0:
                              free_now.append({'title': title, 'end': detail.get('endDate', '')})
                  for offer in promos.get('upcomingPromotionalOffers', []):
                      for detail in offer.get('promotionalOffers', []):
                          if detail.get('discountSetting', {}).get('discountPercentage', 99) == 0:
                              free_next.append({'title': title, 'start': detail.get('startDate', '')})

              if free_now:
                  lines.append('本周免费:')
                  for g in free_now:
                      try:
                          end_str = datetime.fromisoformat(g['end'].replace('Z', '+00:00')).strftime('%m月%d日')
                      except: end_str = ''
                      lines.append(f"  🆓 {g['title']}" + (f"（至 {end_str}）" if end_str else ''))
              else:
                  lines.append('本周暂无免费游戏')

              if free_next:
                  lines.append('下周免费预告:')
                  for g in free_next:
                      try:
                          start_str = datetime.fromisoformat(g['start'].replace('Z', '+00:00')).strftime('%m月%d日')
                      except: start_str = ''
                      lines.append(f"  🔜 {g['title']}" + (f"（{start_str} 开始）" if start_str else ''))

          except Exception as e:
              lines.append(f"⚠️ 获取失败: {e}")

          result = '\n'.join(lines)
          print(result)
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"EPIC_RESULT<<ENDEPIC\n{result}\nENDEPIC\n")
          EOF

      # ─────────────────────────────────────────
      # 6. Steam 特惠
      # ─────────────────────────────────────────
      - name: Steam Sales
        id: steam
        run: |
          python3 - << 'EOF'
          import requests, os

          lines = ['🎮 Steam 今日特惠 Top 10']

          try:
              r = requests.get('https://store.steampowered.com/api/featuredcategories?cc=cn&l=schinese', timeout=15)
              specials = r.json().get('specials', {}).get('items', [])[:10]
              if specials:
                  for item in specials:
                      name     = item.get('name', '未知')
                      discount = item.get('discount_percent', 0)
                      final    = item.get('final_price', 0) / 100
                      original = item.get('original_price', 0) / 100
                      if discount > 0:
                          lines.append(f"  🏷 {name}")
                          lines.append(f"     -{discount}% ¥{original:.0f} → ¥{final:.0f}")
              else:
                  lines.append('暂无特惠数据')
          except Exception as e:
              lines.append(f"⚠️ 获取失败: {e}")

          result = '\n'.join(lines)
          print(result)
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"STEAM_RESULT<<ENDSTEAM\n{result}\nENDSTEAM\n")
          EOF

      # ─────────────────────────────────────────
      # 7. ETF 行情 (单独安装 yfinance)
      # ─────────────────────────────────────────
      - name: ETF Stock Data
        id: stock
        run: |
          # 单独安装 yfinance，确保使用最新版本
          pip install yfinance --break-system-packages
          
          python3 - << 'EOF'
          import requests, os
          from datetime import datetime, timezone, timedelta
          import yfinance as yf

          ETFS = [
              ('510500', '中证500ETF',  '510500.SS'),
              ('518880', '黄金ETF',     '518880.SS'),
              ('510300', '沪深300ETF',  '510300.SS'),
              ('513100', '纳斯达克ETF', '513100.SS'),
              ('513500', '标普500ETF',  '513500.SS'),
          ]

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Referer': 'https://finance.sina.com.cn'
          }

          def get_realtime(code):
              try:
                  r = requests.get(f"https://hq.sinajs.cn/list=sh{code}", headers=headers, timeout=10)
                  r.encoding = 'gbk'
                  data_str = r.text.split('"')[1]
                  if not data_str: return None
                  f = data_str.split(',')
                  prev_close = float(f[2])
                  current    = float(f[3])
                  return {
                      'current':    current,
                      'change_pct': (current - prev_close) / prev_close * 100,
                  }
              except: return None

          def get_history_high(yahoo_symbol):
              try:
                  hist = yf.Ticker(yahoo_symbol).history(period='max')
                  if hist.empty: return None
                  return hist['High'].max()
              except: return None

          def dw(s):
              return sum(2 if ord(c) > 127 else 1 for c in str(s))

          def pad(s, width):
              s = str(s)
              p = width - dw(s)
              l = p // 2
              return ' ' * l + s + ' ' * (p - l)

          cols = [
              ('ETF名称',    12),
              ('现价',        8),
              ('较前日',     10),
              ('历史最高',   10),
              ('现价/最高',  10),
          ]

          def sep(l, m, r):
              return l + m.join('─' * w for _, w in cols) + r

          def row(cells):
              return '│' + '│'.join(pad(c, w) for c, (_, w) in zip(cells, cols)) + '│'

          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M')
          lines = [f'📊 ETF 行情  {now}']
          lines.append(sep('┌', '┬', '┐'))
          lines.append(row([n for n, _ in cols]))
          lines.append(sep('├', '┼', '┤'))

          for code, label, yahoo in ETFS:
              d    = get_realtime(code)
              high = get_history_high(yahoo)
              if d:
                  arrow = '↑' if d['change_pct'] >= 0 else '↓'
                  sign  = '+' if d['change_pct'] >= 0 else ''
                  cur   = f"{d['current']:.3f}"
                  pct   = f"{arrow}{sign}{d['change_pct']:.2f}%"
                  h_str = f"{high:.3f}" if high else 'N/A'
                  ratio = f"{d['current']/high*100:.1f}%" if high else 'N/A'
                  lines.append(row([label, cur, pct, h_str, ratio]))
              else:
                  lines.append(row([label, 'N/A', 'N/A', 'N/A', 'N/A']))

          lines.append(sep('└', '┴', '┘'))

          result = '\n'.join(lines)
          print(result)
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"STOCK_RESULT<<ENDSTOCK\n{result}\nENDSTOCK\n")
          EOF

      # ─────────────────────────────────────────
      # 8. 每日汇率
      # ─────────────────────────────────────────
      - name: Exchange Rates
        id: exchange
        run: |
          python3 - << 'EOF'
          import requests, os
          from datetime import datetime, timezone, timedelta

          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M')
          lines = [f'💱 今日汇率  {now}']

          try:
              r = requests.get('https://open.er-api.com/v6/latest/CNY', timeout=10)
              rates = r.json().get('rates', {})

              def to_cny(code):
                  rate = rates.get(code)
                  return round(1 / rate, 4) if rate else None

              lines.append('1 外币 → 人民币:')
              for code, name, flag in [('MYR','马币','🇲🇾'),('USD','美元','🇺🇸'),('EUR','欧元','🇪🇺'),('SGD','新币','🇸🇬')]:
                  val = to_cny(code)
                  if val: lines.append(f"  {flag} 1 {name} = {val} 元")

              lines.append('1 人民币 → 外币:')
              for code, name, flag in [('JPY','日元','🇯🇵'),('KRW','韩元','🇰🇷'),('HKD','港元','🇭🇰')]:
                  rate = rates.get(code)
                  if rate: lines.append(f"  {flag} 1 元 = {round(rate, 4)} {name}")

          except Exception as e:
              lines.append(f"⚠️ 获取失败: {e}")

          result = '\n'.join(lines)
          print(result)
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"EXCHANGE_RESULT<<ENDEXCHANGE\n{result}\nENDEXCHANGE\n")
          EOF

      # ─────────────────────────────────────────
      # 9. NBA 赛程
      # ─────────────────────────────────────────
      - name: NBA Schedule
        id: nba
        run: |
          python3 - << 'EOF'
          import requests, os, re
          from datetime import datetime, timezone, timedelta
          from bs4 import BeautifulSoup

          cst = timezone(timedelta(hours=8))

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8',
              'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
              'Referer': 'https://www.hupu.com/',
          }

          def et_to_cst(utc_str):
              try:
                  dt = datetime.fromisoformat(utc_str.replace('Z', '+00:00'))
                  return dt.astimezone(cst).strftime('%H:%M')
              except:
                  return ''

          def get_standings_from_hupu():
              HUPU_TO_NBA_ID = {
                  '骑士': '1610612739', '凯尔特人': '1610612738', '尼克斯': '1610612752',
                  '魔术': '1610612753', '雄鹿': '1610612749', '步行者': '1610612754',
                  '热火': '1610612748', '篮网': '1610612751', '76人': '1610612755',
                  '公牛': '1610612741', '老鹰': '1610612737', '黄蜂': '1610612766',
                  '猛龙': '1610612761', '活塞': '1610612765', '奇才': '1610612764',
                  '雷霆': '1610612760', '勇士': '1610612744', '火箭': '1610612745',
                  '灰熊': '1610612763', '湖人': '1610612747', '森林狼': '1610612750',
                  '掘金': '1610612743', '快船': '1610612746', '独行侠': '1610612742',
                  '国王': '1610612758', '太阳': '1610612756', '马刺': '1610612759',
                  '开拓者': '1610612757', '爵士': '1610612762', '鹈鹕': '1610612740',
              }
              
              try:
                  url = 'https://nba.hupu.com/stats/teams'
                  r = requests.get(url, headers=headers, timeout=15)
                  
                  if r.status_code == 200:
                      soup = BeautifulSoup(r.text, 'html.parser')
                      ranking = {}
                      
                      tables = soup.find_all('table')
                      
                      for table in tables:
                          rows = table.find_all('tr')
                          for row in rows[1:]:
                              cols = row.find_all('td')
                              if len(cols) >= 2:
                                  rank_text = cols[0].get_text(strip=True)
                                  team_text = cols[1].get_text(strip=True)
                                  
                                  rank_match = re.search(r'\d+', rank_text)
                                  if rank_match:
                                      rank = int(rank_match.group())
                                      
                                      for team_name, team_id in HUPU_TO_NBA_ID.items():
                                          if team_name in team_text:
                                              ranking[team_id] = rank
                                              break
                      
                      if len(ranking) >= 28:
                          return ranking
                  
              except Exception as e:
                  print(f"⚠️ 虎扑爬取失败: {e}")
              
              return None

          def get_standings_espn():
              ESPN_TO_NBA_ID = {
                  'ATL': '1610612737', 'BOS': '1610612738', 'BKN': '1610612751',
                  'CHA': '1610612766', 'CHI': '1610612741', 'CLE': '1610612739',
                  'DAL': '1610612742', 'DEN': '1610612743', 'DET': '1610612765',
                  'GSW': '1610612744', 'HOU': '1610612745', 'IND': '1610612754',
                  'LAC': '1610612746', 'LAL': '1610612747', 'MEM': '1610612763',
                  'MIA': '1610612748', 'MIL': '1610612749', 'MIN': '1610612750',
                  'NOP': '1610612740', 'NYK': '1610612752', 'OKC': '1610612760',
                  'ORL': '1610612753', 'PHI': '1610612755', 'PHX': '1610612756',
                  'POR': '1610612757', 'SAC': '1610612758', 'SAS': '1610612759',
                  'TOR': '1610612761', 'UTA': '1610612762', 'WAS': '1610612764',
              }
              try:
                  url = 'https://site.web.api.espn.com/apis/v2/sports/basketball/nba/standings'
                  params = {'season': 2025, 'seasontype': 2}
                  r = requests.get(url, headers={'User-Agent': headers['User-Agent']}, params=params, timeout=10)
                  
                  data = r.json()
                  ranking = {}
                  
                  for conf in data.get('children', []):
                      entries = conf.get('standings', {}).get('entries', [])
                      for i, entry in enumerate(entries, 1):
                          abbr = entry.get('team', {}).get('abbreviation', '')
                          nba_id = ESPN_TO_NBA_ID.get(abbr)
                          if nba_id:
                              ranking[nba_id] = i
                  
                  if ranking:
                      return ranking
                  return None
              except Exception as e:
                  print(f"❌ ESPN失败: {e}")
                  return None

          def get_standings():
              ranking = get_standings_from_hupu()
              if ranking and len(ranking) >= 28:
                  return ranking
              return get_standings_espn()

          def calc_hot_games(games, ranking):
              if ranking is None:
                  return set(), {}
              scored = []
              rank_info = {}
              for g in games:
                  away_id = str(g['awayTeam'].get('teamId', ''))
                  home_id = str(g['homeTeam'].get('teamId', ''))
                  r_away = ranking.get(away_id, 99)
                  r_home = ranking.get(home_id, 99)
                  
                  if r_away == 99 or r_home == 99:
                      score = 0
                  else:
                      score = (99 - r_away) + (99 - r_home)
                      if r_away <= 10 and r_home <= 10:
                          score += 15
                  
                  game_id = str(g['gameId'])
                  scored.append((score, game_id))
                  rank_info[game_id] = (r_away, r_home)
              
              scored.sort(key=lambda x: x[0], reverse=True)
              hot_ids = {gid for score, gid in scored[:2] if score > 0}
              return hot_ids, rank_info

          r = requests.get(
              'https://cdn.nba.com/static/json/liveData/scoreboard/todaysScoreboard_00.json',
              headers={'User-Agent': headers['User-Agent']}, timeout=10
          )
          data = r.json()
          games = data.get('scoreboard', {}).get('games', [])
          game_date = data.get('scoreboard', {}).get('gameDate', '')

          ranking = get_standings()
          hot_ids, rank_info = calc_hot_games(games, ranking)
          use_rankings = ranking is not None

          finished, ongoing, upcoming = [], [], []

          for g in games:
              away = g['awayTeam']
              home = g['homeTeam']
              status = g.get('gameStatus', 1)
              status_txt = g.get('gameStatusText', '').strip()
              start_cst = et_to_cst(g.get('gameTimeUTC', ''))
              game_id = str(g['gameId'])
              is_hot = game_id in hot_ids
              r_away, r_home = rank_info.get(game_id, (99, 99))

              info = {
                  'home': f"{home['teamCity']} {home['teamName']}",
                  'away': f"{away['teamCity']} {away['teamName']}",
                  'home_score': home.get('score', 0),
                  'away_score': away.get('score', 0),
                  'status_txt': status_txt,
                  'start_cst': start_cst,
                  'r_home': r_home,
                  'r_away': r_away,
                  'is_hot': is_hot,
              }
              if status == 3:
                  finished.append(info)
              elif status == 2:
                  ongoing.append(info)
              else:
                  upcoming.append(info)

          sections = [f"**赛事日期:** {game_date}\n"]

          if ongoing:
              block = ['### 🔴 进行中\n']
              block.append('| 主场 | 客场 | 比分 | 节次 |')
              block.append('|:---|:---|:---:|:---:|')
              for g in ongoing:
                  hot = '🔥 ' if g['is_hot'] else ''
                  home_rank = f" #{g['r_home']}" if use_rankings and g['r_home'] != 99 else ''
                  away_rank = f" #{g['r_away']}" if use_rankings and g['r_away'] != 99 else ''
                  block.append(
                      f"| {hot}**{g['home']}**{home_rank} "
                      f"| **{g['away']}**{away_rank} "
                      f"| {g['home_score']} - {g['away_score']} "
                      f"| {g['status_txt']} |"
                  )
              sections.append('\n'.join(block))

          if upcoming:
              block = ['### 🕐 今日待开赛\n']
              block.append('| 主场 | 客场 | 开赛时间(北京) |')
              block.append('|:---|:---|:---:|')
              for g in upcoming:
                  hot = '🔥 ' if g['is_hot'] else ''
                  home_rank = f" #{g['r_home']}" if use_rankings and g['r_home'] != 99 else ''
                  away_rank = f" #{g['r_away']}" if use_rankings and g['r_away'] != 99 else ''
                  time = g['start_cst'] if g['start_cst'] else '-'
                  block.append(
                      f"| {hot}**{g['home']}**{home_rank} "
                      f"| **{g['away']}**{away_rank} "
                      f"| {time} |"
                  )
              sections.append('\n'.join(block))

          if finished:
              block = ['### ✅ 已结束\n']
              block.append('| 主场 | 客场 | 比分 | 结果 |')
              block.append('|:---|:---|:---:|:---:|')
              for g in finished:
                  hot = '🔥 ' if g['is_hot'] else ''
                  winner = g['home'] if g['home_score'] > g['away_score'] else g['away']
                  home_rank = f" #{g['r_home']}" if use_rankings and g['r_home'] != 99 else ''
                  away_rank = f" #{g['r_away']}" if use_rankings and g['r_away'] != 99 else ''
                  home_fmt = f"**{g['home']}**" if g['home'] == winner else g['home']
                  away_fmt = f"**{g['away']}**" if g['away'] == winner else g['away']
                  block.append(
                      f"| {hot}{home_fmt}{home_rank} "
                      f"| {away_fmt}{away_rank} "
                      f"| {g['home_score']} - {g['away_score']} "
                      f"| 🏆 **{winner}** |"
                  )
              sections.append('\n'.join(block))

          if not games:
              sections.append('今日暂无比赛')

          if use_rankings and hot_ids:
              team_count = len(ranking) if ranking else 0
              sections.append(f'> 🔥 热门: 基于总排名计算，前10强对决额外加权（已获取 {team_count}/30 支球队）')
          elif not use_rankings:
              sections.append('> ⚠️ 积分榜数据暂不可用，本次不标注热门场次')

          result = '\n\n'.join(sections)
          print(result)
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"NBA_RESULT<<ENDNBA\n{result}\nENDNBA\n")
          EOF

      # ─────────────────────────────────────────
      # 10. Server酱推送汇总
      # ─────────────────────────────────────────
      - name: Push to Server酱
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: |
          python3 - << 'EOF'
          import os, requests, datetime

          key = os.environ.get('SERVERCHAN_KEY', '')
          if not key:
              print("未设置 SERVERCHAN_KEY，跳过推送")
              exit(0)

          now = datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=8))).strftime("%Y-%m-%d %H:%M")
          title = f"📋 每日报告 {now}"

          sections = [
              os.environ.get('BILIBILI_RESULT', '📺 Bilibili: 未运行'),
              os.environ.get('JUEJIN_RESULT',   '🪙 掘金: 未运行'),
              os.environ.get('BAIDU_RESULT',     '☁️ 百度网盘: 未运行'),
              os.environ.get('JD_RESULT',        '🛒 京东: 未运行'),
              os.environ.get('EPIC_RESULT',      '🎮 Epic: 未运行'),
              os.environ.get('STEAM_RESULT',     '🎮 Steam: 未运行'),
              os.environ.get('STOCK_RESULT',     '📊 ETF行情: 未运行'),
              os.environ.get('EXCHANGE_RESULT',  '💱 汇率: 未运行'),
              os.environ.get('NBA_RESULT',       '🏀 NBA: 未运行'),
          ]
          desp = '\n\n---\n\n'.join(sections)

          url = f"https://sctapi.ftqq.com/{key}.send"
          r = requests.post(url, data={'title': title, 'desp': desp}, timeout=10)
          print("Server酱推送结果:", r.json())
          EOF
