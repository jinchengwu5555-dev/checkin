name: Daily Checkin All

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00（北京时间 08:00）触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    environment: user

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Random Delay (北京时间 08:00~09:00)
        run: |
          delay=$((RANDOM % 3600))
          echo "随机等待 ${delay} 秒（约 $((delay/60)) 分钟）"
          sleep $delay

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install requests dailycheckin --break-system-packages
          npm install axios

      # ─────────────────────────────────────────
      # 1. Bilibili
      # ─────────────────────────────────────────
      - name: Bilibili Checkin
        id: bilibili
        env:
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
        run: |
          python3 - << 'EOF'
          import os, requests, time, sys

          cookie = os.environ.get('BILIBILI_COOKIE', '')
          if not cookie:
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write("BILIBILI_RESULT=📺 Bilibili\n❌ 签到失败: 未设置 BILIBILI_COOKIE\n")
              sys.exit(0)

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Cookie': cookie,
              'Referer': 'https://www.bilibili.com/'
          }

          def get_csrf():
              for item in cookie.split(';'):
                  if 'bili_jct' in item:
                      return item.split('=')[1].strip()
              return ''

          lines = ['📺 Bilibili']

          try:
              r = requests.get('https://api.bilibili.com/x/web-interface/nav', headers=headers, timeout=10)
              d = r.json()
              if d['code'] == 0:
                  lines.append(f"用户: {d['data']['uname']}")
              else:
                  lines.append("❌ 签到失败: Cookie 失效")
                  result = '\n'.join(lines)
                  with open(os.environ['GITHUB_ENV'], 'a') as f:
                      f.write(f"BILIBILI_RESULT<<ENDBILIBILI\n{result}\nENDBILIBILI\n")
                  sys.exit(0)
          except Exception as e:
              lines.append(f"❌ 签到失败: {e}")
              result = '\n'.join(lines)
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f"BILIBILI_RESULT<<ENDBILIBILI\n{result}\nENDBILIBILI\n")
              sys.exit(0)

          lines.append("✅ 签到成功")

          videos = []
          try:
              r = requests.get('https://api.bilibili.com/x/web-interface/index/top/rcmd',
                               headers=headers, params={'fresh_type': 3, 'ps': 10}, timeout=10)
              d = r.json()
              if d['code'] == 0:
                  videos = [item['id'] for item in d['data']['item'] if 'id' in item][:5]
          except: pass

          if videos:
              try:
                  r = requests.get(f'https://api.bilibili.com/x/web-interface/view?aid={videos[0]}', headers=headers, timeout=10)
                  d = r.json()
                  if d['code'] == 0:
                      cid = d['data']['cid']
                      requests.post('https://api.bilibili.com/x/click-interface/web/heartbeat',
                                    headers=headers,
                                    data={'aid': videos[0], 'cid': cid, 'played_time': 60, 'csrf': get_csrf()},
                                    timeout=10)
                      lines.append("✅ 观看视频成功")
              except Exception as e:
                  lines.append(f"⚠️ 观看视频异常: {e}")

              coin_ok = 0
              for aid in videos[:2]:
                  try:
                      r = requests.post('https://api.bilibili.com/x/web-interface/coin/add',
                                        headers=headers,
                                        data={'aid': aid, 'multiply': 1, 'select_like': 1,
                                              'cross_domain': 'true', 'csrf': get_csrf()},
                                        timeout=10)
                      if r.json().get('code') == 0:
                          coin_ok += 1
                      time.sleep(2)
                  except: pass
              lines.append(f"✅ 投币成功: {coin_ok} 枚")

              try:
                  r = requests.post('https://api.bilibili.com/x/web-interface/share/add',
                                    headers=headers,
                                    data={'aid': videos[0], 'csrf': get_csrf()},
                                    timeout=10)
                  if r.json().get('code') == 0:
                      lines.append("✅ 分享视频成功")
              except: pass

          result = '\n'.join(lines)
          print(result)
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"BILIBILI_RESULT<<ENDBILIBILI\n{result}\nENDBILIBILI\n")
          EOF

      # ─────────────────────────────────────────
      # 2. 掘金
      # ─────────────────────────────────────────
      - name: Juejin Checkin
        id: juejin
        env:
          JUEJIN_COOKIES: ${{ secrets.JUEJIN_COOKIES }}
        run: |
          cat > juejin_task.js << 'EOF'
          const axios = require('axios');
          const fs = require('fs');

          const cookies = process.env.JUEJIN_COOKIES ? process.env.JUEJIN_COOKIES.split('#') : [];
          const AID_APP = "1931", AID_WEB = "2608";
          const generateUUID = () => "71439" + Math.floor(Math.random() * 1000000000);

          async function executeTask(cookie) {
            const uuid = generateUUID();
            const APP_PARAMS = `?aid=${AID_APP}&uuid=${uuid}&app_name=juejin_sdk&device_platform=android`;
            const WEB_PARAMS = `?aid=${AID_WEB}&uuid=${uuid}`;
            const api = axios.create({
              baseURL: 'https://api.juejin.cn', timeout: 15000,
              headers: {
                'Cookie': cookie,
                'User-Agent': 'Mozilla/5.0 (Linux; Android 12; SM-G991B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Mobile Safari/537.36 Juejin/Android/6.0.1',
                'Content-Type': 'application/json'
              }
            });
            let report = ['🪙 掘金'];
            try {
              const userRes = await api.get("/user_api/v1/user/get" + WEB_PARAMS);
              report.push("用户: " + (userRes.data?.data?.user_name || "未知"));

              const ck = await api.post("/growth_api/v1/check_in" + APP_PARAMS, {});
              if (ck.data?.err_no === 0) {
                report.push("✅ 签到成功: +" + ck.data.data.incr_point + " 矿石");
              } else if (ck.data?.err_no === 20001 || ck.data?.err_msg?.includes("已完成")) {
                report.push("ℹ️ 今日已签到");
              } else {
                report.push("❌ 签到失败: " + (ck.data?.err_msg || "未知错误"));
              }

              try {
                const history = await api.post("/growth_api/v1/lottery_history/global_big" + WEB_PARAMS, { page_no: 1, page_size: 5 });
                const luckyId = history.data?.data?.lotteries?.[0]?.history_id || "7143943034230636551";
                const dip = await api.post("/growth_api/v1/lottery_lucky/dip_lucky" + APP_PARAMS, { lottery_history_id: luckyId });
                if (dip.data?.err_no === 0) {
                  report.push("✅ 沾喜气成功: +" + dip.data.data.dip_value + " 幸运值");
                } else {
                  report.push("ℹ️ 沾喜气: 今日已沾");
                }
              } catch { report.push("⚠️ 沾喜气异常"); }

              const cfg = await api.get("/growth_api/v1/lottery_config/get" + APP_PARAMS);
              if (cfg.data?.data?.free_count > 0) {
                const draw = await api.post("/growth_api/v1/lottery/draw" + APP_PARAMS, {});
                if (draw.data?.err_no === 0) {
                  report.push("✅ 抽奖成功: " + draw.data.data.lottery_name);
                } else {
                  report.push("❌ 抽奖失败");
                }
              } else {
                report.push("ℹ️ 今日无免费抽奖");
              }

              const counts = await api.get("/growth_api/v1/get_counts" + WEB_PARAMS);
              const pts = await api.get("/growth_api/v1/get_cur_point" + WEB_PARAMS);
              if (counts.data?.data) {
                report.push(`连续签到: ${counts.data.data.cont_count} 天 | 累计: ${counts.data.data.sum_count} 天`);
              }
              if (pts.data) report.push("当前矿石: " + pts.data.data);
            } catch(e) {
              report.push("⚠️ 异常: " + e.message);
            }
            return report.join('\n');
          }

          async function main() {
            if (!cookies.length) {
              fs.appendFileSync(process.env.GITHUB_ENV, "JUEJIN_RESULT=🪙 掘金\n❌ 签到失败: 未设置 JUEJIN_COOKIES\n");
              return;
            }
            let all = [];
            for (let i = 0; i < cookies.length; i++) all.push(await executeTask(cookies[i]));
            const result = all.join('\n----------\n');
            console.log(result);
            fs.appendFileSync(process.env.GITHUB_ENV, `JUEJIN_RESULT<<ENDJUEJIN\n${result}\nENDJUEJIN\n`);
          }
          main();
          EOF
          node juejin_task.js

      # ─────────────────────────────────────────
      # 3. 百度网盘
      # ─────────────────────────────────────────
      - name: Baidu Netdisk Checkin
        id: baidu
        env:
          BAIDUWP_COOKIE: ${{ secrets.BAIDUWP_COOKIE }}
        run: |
          python3 - << 'EOF'
          import os, json, subprocess, sys

          cookie = os.environ.get('BAIDUWP_COOKIE', '')
          if not cookie:
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write("BAIDU_RESULT=☁️ 百度网盘\n❌ 签到失败: 未设置 BAIDUWP_COOKIE\n")
              sys.exit(0)

          try:
              with open('config.json', 'r') as f:
                  config = json.load(f)
              config['BAIDUWP'][0]['cookie'] = cookie
              with open('config.json', 'w') as f:
                  json.dump(config, f)
          except Exception:
              config = {"BAIDUWP": [{"cookie": cookie}]}
              with open('config.json', 'w') as f:
                  json.dump(config, f)

          proc = subprocess.run(['dailycheckin'], capture_output=True, text=True)
          output = proc.stdout + proc.stderr

          keep = []
          for line in output.splitlines():
              line = line.strip()
              if not line: continue
              if any(x in line for x in ['当前时间', '当前版本', '使用配置', '本次执行', '账号数', '开始执行', '---']): continue
              keep.append(line)

          joined = '\n'.join(keep)
          if '✅' in joined:
              status = '✅ 签到成功'
          elif 'fail' in joined.lower() or '失败' in joined:
              status = '❌ 签到失败'
          else:
              status = 'ℹ️ 今日已签到'

          lines = ['☁️ 百度网盘', status]
          if keep:
              lines.append('\n'.join(keep))

          result = '\n'.join(lines)
          print(result)
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"BAIDU_RESULT<<ENDBAIDU\n{result}\nENDBAIDU\n")
          EOF

      # ─────────────────────────────────────────
      # 4. 京东
      # ─────────────────────────────────────────
      - name: JD Checkin
        id: jd
        env:
          JD_COOKIE: ${{ secrets.JD_COOKIE }}
        run: |
          cat > jd_sign.js << 'EOF'
          const axios = require('axios');
          const fs = require('fs');

          const cookie = process.env.JD_COOKIE;
          if (!cookie) {
            fs.appendFileSync(process.env.GITHUB_ENV, "JD_RESULT=🛒 京东\n❌ 签到失败: 未设置 JD_COOKIE\n");
            process.exit(0);
          }

          async function sign() {
            let lines = ['🛒 京东'];
            try {
              const res = await axios.post(
                'https://api.m.jd.com/client.action',
                'functionId=signBeanAct&appid=ld&body=%7B%22rnVersion%22%3A%228.1.0%22%2C%22channel%22%3A1%2C%22os%22%3A%22apple%22%2C%22enAli%22%3A%221%22%7D',
                {
                  headers: {
                    'Cookie': cookie,
                    'User-Agent': 'JDMobileIOS/13.0.2 (iPhone; iOS 16.0; Scale/3.00)',
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'Referer': 'https://bean.m.jd.com/',
                    'Host': 'api.m.jd.com'
                  }
                }
              );
              const d = res.data?.data;
              if (d?.status === 1) {
                lines.push("✅ 签到成功: +" + (d.signInfo?.signScore || 0) + " 京豆");
              } else if (d?.status === 2) {
                lines.push("ℹ️ 今日已签到");
              } else if (d?.status === 3) {
                lines.push("❌ 签到失败: Cookie 已过期");
              } else {
                lines.push("❌ 签到失败: 未知状态 " + JSON.stringify(d));
              }
            } catch(e) {
              lines.push("❌ 签到失败: " + e.message);
            }
            const result = lines.join('\n');
            console.log(result);
            fs.appendFileSync(process.env.GITHUB_ENV, `JD_RESULT<<ENDJD\n${result}\nENDJD\n`);
          }
          sign();
          EOF
          node jd_sign.js

      # ─────────────────────────────────────────
      # 5. Epic 免费游戏
      # ─────────────────────────────────────────
      - name: Epic Free Games
        id: epic
        run: |
          python3 - << 'EOF'
          import requests, os
          from datetime import datetime, timezone

          lines = ['🎮 Epic 本周免费游戏']

          try:
              url = 'https://store-site-backend-static.ak.epicgames.com/freeGamesPromotions?locale=zh-CN&country=CN&allowCountries=CN'
              r = requests.get(url, timeout=15)
              data = r.json()
              games = data['data']['Catalog']['searchStore']['elements']

              free_now = []
              free_next = []

              for game in games:
                  title = game.get('title', '未知游戏')
                  promos = game.get('promotions')
                  if not promos:
                      continue
                  for offer in promos.get('promotionalOffers', []):
                      for detail in offer.get('promotionalOffers', []):
                          if detail.get('discountSetting', {}).get('discountPercentage', 99) == 0:
                              free_now.append({'title': title, 'end': detail.get('endDate', '')})
                  for offer in promos.get('upcomingPromotionalOffers', []):
                      for detail in offer.get('promotionalOffers', []):
                          if detail.get('discountSetting', {}).get('discountPercentage', 99) == 0:
                              free_next.append({'title': title, 'start': detail.get('startDate', '')})

              if free_now:
                  lines.append('本周免费:')
                  for g in free_now:
                      try:
                          end_str = datetime.fromisoformat(g['end'].replace('Z', '+00:00')).strftime('%m月%d日')
                      except:
                          end_str = ''
                      lines.append(f"  🆓 {g['title']}" + (f"（至 {end_str}）" if end_str else ''))
              else:
                  lines.append('本周暂无免费游戏')

              if free_next:
                  lines.append('下周免费预告:')
                  for g in free_next:
                      try:
                          start_str = datetime.fromisoformat(g['start'].replace('Z', '+00:00')).strftime('%m月%d日')
                      except:
                          start_str = ''
                      lines.append(f"  🔜 {g['title']}" + (f"（{start_str} 开始）" if start_str else ''))

          except Exception as e:
              lines.append(f"⚠️ 获取失败: {e}")

          result = '\n'.join(lines)
          print(result)
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"EPIC_RESULT<<ENDEPIC\n{result}\nENDEPIC\n")
          EOF

      # ─────────────────────────────────────────
      # 6. Steam 特惠
      # ─────────────────────────────────────────
      - name: Steam Sales
        id: steam
        run: |
          python3 - << 'EOF'
          import requests, os

          lines = ['🎮 Steam 今日特惠 Top 10']

          try:
              url = 'https://store.steampowered.com/api/featuredcategories?cc=cn&l=schinese'
              r = requests.get(url, timeout=15)
              data = r.json()
              specials = data.get('specials', {}).get('items', [])[:10]

              if specials:
                  for item in specials:
                      name = item.get('name', '未知')
                      discount = item.get('discount_percent', 0)
                      final = item.get('final_price', 0) / 100
                      original = item.get('original_price', 0) / 100
                      if discount > 0:
                          lines.append(f"  🏷 {name}")
                          lines.append(f"     -{discount}% ¥{original:.0f} → ¥{final:.0f}")
              else:
                  lines.append('暂无特惠数据')

          except Exception as e:
              lines.append(f"⚠️ 获取失败: {e}")

          result = '\n'.join(lines)
          print(result)
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"STEAM_RESULT<<ENDSTEAM\n{result}\nENDSTEAM\n")
          EOF

      # ─────────────────────────────────────────
      # 7. 每日汇率
      # ─────────────────────────────────────────
      - name: Exchange Rates
        id: exchange
        run: |
          python3 - << 'EOF'
          import requests, os
          from datetime import datetime, timezone, timedelta

          lines = ['💱 今日汇率']
          cst = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d')
          lines.append(f"更新时间: {cst}")

          try:
              r = requests.get('https://open.er-api.com/v6/latest/CNY', timeout=10)
              data = r.json()
              rates = data.get('rates', {})

              def foreign_to_cny(code):
                  rate = rates.get(code)
                  if rate and rate != 0:
                      return round(1 / rate, 4)
                  return None

              pairs_to_cny = [
                  ('MYR', '马币', '🇲🇾'),
                  ('USD', '美元', '🇺🇸'),
                  ('EUR', '欧元', '🇪🇺'),
                  ('SGD', '新币', '🇸🇬'),
              ]
              pairs_from_cny = [
                  ('JPY', '日元', '🇯🇵'),
                  ('KRW', '韩元', '🇰🇷'),
                  ('HKD', '港元', '🇭🇰'),
              ]

              lines.append('')
              lines.append('1 外币 → 人民币:')
              for code, name, flag in pairs_to_cny:
                  val = foreign_to_cny(code)
                  if val:
                      lines.append(f"  {flag} 1 {name} = {val} 元")

              lines.append('')
              lines.append('1 人民币 → 外币:')
              for code, name, flag in pairs_from_cny:
                  rate = rates.get(code)
                  if rate:
                      lines.append(f"  {flag} 1 元 = {round(rate, 4)} {name}")

          except Exception as e:
              lines.append(f"⚠️ 获取失败: {e}")

          result = '\n'.join(lines)
          print(result)
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"EXCHANGE_RESULT<<ENDEXCHANGE\n{result}\nENDEXCHANGE\n")
          EOF

      # ─────────────────────────────────────────
      # 8. Server酱推送汇总
      # ─────────────────────────────────────────
      - name: Push to Server酱
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: |
          python3 - << 'EOF'
          import os, requests, datetime

          key = os.environ.get('SERVERCHAN_KEY', '')
          if not key:
              print("未设置 SERVERCHAN_KEY，跳过推送")
              exit(0)

          now = datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=8))).strftime("%Y-%m-%d %H:%M")
          title = f"📋 每日报告 {now}"

          sections = [
              os.environ.get('BILIBILI_RESULT', '📺 Bilibili: 未运行'),
              os.environ.get('JUEJIN_RESULT',   '🪙 掘金: 未运行'),
              os.environ.get('BAIDU_RESULT',     '☁️ 百度网盘: 未运行'),
              os.environ.get('JD_RESULT',        '🛒 京东: 未运行'),
              os.environ.get('EPIC_RESULT',      '🎮 Epic: 未运行'),
              os.environ.get('STEAM_RESULT',     '🎮 Steam: 未运行'),
              os.environ.get('EXCHANGE_RESULT',  '💱 汇率: 未运行'),
          ]
          desp = '\n\n---\n\n'.join(sections)

          url = f"https://sctapi.ftqq.com/{key}.send"
          r = requests.post(url, data={'title': title, 'desp': desp}, timeout=10)
          print("Server酱推送结果:", r.json())
          EOF
