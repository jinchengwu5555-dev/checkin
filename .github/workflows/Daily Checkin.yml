name: Daily Checkin All

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00（北京时间 08:00）触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    # 移除了 environment: user，避免需要手动审批导致不执行

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Random Delay (北京时间 08:00~09:00)
        run: |
          delay=$((RANDOM % 3600))
          echo "随机等待 ${delay} 秒（约 $((delay/60)) 分钟）"
          sleep $delay

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install requests dailycheckin yfinance --break-system-packages
          npm install axios

      # ─────────────────────────────────────────
      # 1. Bilibili
      # ─────────────────────────────────────────
      - name: Bilibili Checkin
        id: bilibili
        env:
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
        run: |
          python3 - << 'EOF'
          import os, requests, time, sys

          cookie = os.environ.get('BILIBILI_COOKIE', '')
