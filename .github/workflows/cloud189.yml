name: Cloud189 Checkin
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  checkin:
    runs-on: ubuntu-latest
    environment: user
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install cloud189-sdk
        run: npm install cloud189-sdk

      - name: Debug client methods
        run: node -e "const { CloudAuthClient } = require('cloud189-sdk'); const client = new CloudAuthClient('test', 'test'); console.log('CloudAuthClient methods:', Object.getOwnPropertyNames(Object.getPrototypeOf(client)));"

      - name: Write script
        run: |
          cat > cloud189_sign.js << 'JSEOF'
          const { CloudAuthClient } = require('cloud189-sdk');

          const username = process.env.TY_USERNAME;
          const password = process.env.TY_PASSWORD;

          async function main() {
            try {
              const client = new CloudAuthClient(username, password);
              console.log('Client methods:', Object.getOwnPropertyNames(Object.getPrototypeOf(client)));
              
              // 尝试调用登录方法
              if (typeof client.login === 'function') {
                await client.login();
              } else if (typeof client.authenticate === 'function') {
                await client.authenticate();
              } else {
                console.log('Available methods:', Object.getOwnPropertyNames(Object.getPrototypeOf(client)));
              }
              
              console.log('登录成功');

              const res1 = await client.userSign();
              console.log('个人签到:', res1.isSign ? '今日已签' : `获得 ${res1.netdiskBonus}M 空间`);

              const res2 = await client.familySign();
              if (res2 && res2.length > 0) {
                res2.forEach(r => {
                  console.log('家庭签到:', r.isSign ? '今日已签' : `获得 ${r.bonusSpace}M 空间`);
                });
              }
            } catch(e) {
              console.error('错误:', e.message);
            }
          }

          main();
          JSEOF

      - name: Run
        env:
          TY_USERNAME: ${{ secrets.TY_USERNAME }}
          TY_PASSWORD: ${{ secrets.TY_PASSWORD }}
        run: node cloud189_sign.js
