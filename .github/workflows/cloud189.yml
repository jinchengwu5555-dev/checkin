name: checkin

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install axios

      - run: node cloud189_sign.js
        env:
          CLOUD189_COOKIE: ${{ secrets.CLOUD189_COOKIE }}
