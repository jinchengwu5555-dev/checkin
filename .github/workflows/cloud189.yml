name: Cloud189 Checkin
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  checkin:
    runs-on: ubuntu-latest
    environment: user
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests rsa

      - name: Create checkin script
        run: |
          cat > cloud189_checkin.py << 'EOF'
          import os
          import re
          import base64
          import rsa
          import requests
          from urllib.parse import urlparse, parse_qs

          class Cloud189:
              def __init__(self, username, password):
                  self.username = username
                  self.password = password
                  self.session = requests.Session()
                  self.session.headers.update({
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                      'Referer': 'https://cloud.189.cn'
                  })

              def login(self):
                  try:
                      # 获取登录页面
                      url = 'https://cloud.189.cn/api/portal/loginUrl.action'
                      params = {'redirectURL': 'https://cloud.189.cn/main.action'}
                      r = self.session.get(url, params=params)
                      
                      if r.status_code != 200:
                          print(f'获取登录URL失败: {r.status_code}')
                          return False
                      
                      login_url = r.json().get('loginUrl')
                      if not login_url:
                          print('未获取到登录URL')
                          return False
                      
                      # 获取加密参数
                      r = self.session.get(login_url)
                      captcha_token = re.findall(r"captchaToken' value='(.+?)'", r.text)
                      lt = re.findall(r'lt = "(.+?)"', r.text)
                      return_url = re.findall(r"returnUrl = '(.+?)'", r.text)
                      param_id = re.findall(r'paramId = "(.+?)"', r.text)
                      
                      if not all([captcha_token, lt, return_url, param_id]):
                          print('未获取到必要的登录参数')
                          return False
                      
                      # 获取RSA公钥
                      req_key = re.findall(r'reqId = "(.+?)"', r.text)
                      if not req_key:
                          print('未获取到RSA密钥')
                          return False
                      
                      r = self.session.post(
                          'https://open.e.189.cn/api/logbox/config/encryptConf.do',
                          data={'appId': 'cloud'}
                      )
                      
                      data = r.json().get('data', {})
                      pub_key = data.get('pubKey', '')
                      
                      if not pub_key:
                          print('未获取到公钥')
                          return False
                      
                      # RSA加密
                      pub_key = f'-----BEGIN PUBLIC KEY-----\n{pub_key}\n-----END PUBLIC KEY-----'
                      rsa_key = rsa.PublicKey.load_pkcs1_openssl_pem(pub_key.encode())
                      
                      encrypted_user = base64.b64encode(
                          rsa.encrypt(self.username.encode(), rsa_key)
                      ).decode()
                      
                      encrypted_pass = base64.b64encode(
                          rsa.encrypt(self.password.encode(), rsa_key)
                      ).decode()
                      
                      # 登录
                      login_data = {
                          'appKey': 'cloud',
                          'accountType': '01',
                          'userName': f'{{RSA}}{encrypted_user}',
                          'password': f'{{RSA}}{encrypted_pass}',
                          'validateCode': '',
                          'captchaToken': captcha_token[0],
                          'returnUrl': return_url[0],
                          'mailSuffix': '@189.cn',
                          'paramId': param_id[0],
                          'lt': lt[0],
                          'reqId': req_key[0]
                      }
                      
                      r = self.session.post(login_url, data=login_data)
                      result = r.json()
                      
                      if result.get('result') == 0:
                          print('登录成功')
                          redirect_url = result.get('toUrl')
                          if redirect_url:
                              self.session.get(redirect_url)
                          return True
                      else:
                          print(f'登录失败: {result.get("msg")}')
                          return False
                          
                  except Exception as e:
                      print(f'登录异常: {e}')
                      import traceback
                      traceback.print_exc()
                      return False

              def checkin(self):
                  try:
                      url = 'https://api.cloud.189.cn/mkt/userSign.action'
                      r = self.session.get(url)
                      
                      if r.status_code == 200:
                          data = r.json()
                          if data.get('isSign'):
                              print('今日已签到')
                          else:
                              bonus = data.get('netdiskBonus', 0)
                              print(f'签到成功，获得 {bonus}M 空间')
                          return True
                      else:
                          print(f'签到失败: {r.status_code}')
                          return False
                          
                  except Exception as e:
                      print(f'签到异常: {e}')
                      return False

          if __name__ == '__main__':
              username = os.environ.get('CLOUD189_USER')
              password = os.environ.get('CLOUD189_PWD')
              
              if not username or not password:
                  print('未设置账号密码')
                  exit(1)
              
              cloud = Cloud189(username, password)
              if cloud.login():
                  cloud.checkin()
              else:
                  print('登录失败，无法签到')
                  exit(1)
          EOF

      - name: Run checkin
        env:
          CLOUD189_USER: ${{ secrets.TY_USERNAME }}
          CLOUD189_PWD: ${{ secrets.TY_PASSWORD }}
        run: |
          python cloud189_checkin.py
