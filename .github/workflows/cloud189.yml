name: Cloud189 Checkin
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  checkin:
    runs-on: ubuntu-latest
    environment: user
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install axios crypto-js

      - name: Write script
        run: |
          cat > cloud189_sign.js << 'JSEOF'
          const axios = require('axios');
          const crypto = require('crypto-js');

          const username = process.env.TY_USERNAME;
          const password = process.env.TY_PASSWORD;

          const client = axios.create({
            headers: {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Referer': 'https://cloud.189.cn/web/login.html'
            },
            withCredentials: true
          });

          async function login() {
            try {
              // 获取登录页面
              const loginPage = await client.get('https://cloud.189.cn/api/portal/loginUrl.action?redirectURL=https://cloud.189.cn/web/redirect.html');
              const loginUrl = loginPage.data.loginUrl;

              // 获取加密参数
              const encryptPage = await client.get(loginUrl);
              const lt = encryptPage.data.match(/name="lt" value="(.*?)"/)[1];
              const returnUrl = encryptPage.data.match(/returnUrl = '(.*?)'/)[1];
              const paramId = encryptPage.data.match(/paramId = "(.*?)"/)[1];
              const j_rsaKey = encryptPage.data.match(/j_rsaKey" value="(.*?)"/)[1];

              // RSA 加密密码
              const encrypt = new JSEncrypt();
              encrypt.setPublicKey(j_rsaKey);
              const encryptedPassword = encrypt.encrypt(password);

              // 登录
              const loginData = new URLSearchParams({
                appKey: 'cloud',
                accountType: '01',
                userName: `{RSA}${encrypt.encrypt(username)}`,
                password: `{RSA}${encryptedPassword}`,
                validateCode: '',
                captchaToken: '',
                returnUrl: returnUrl,
                mailSuffix: '@189.cn',
                dynamicCheck: 'FALSE',
                clientType: '1',
                cb_SaveName: '0',
                isOauth2: 'false',
                state: '',
                paramId: paramId,
                lt: lt
              });

              const loginResult = await client.post(loginUrl, loginData);
              
              if (loginResult.data.result === 0) {
                console.log('登录成功');
                return true;
              } else {
                console.log('登录失败:', loginResult.data.msg);
                return false;
              }
            } catch (e) {
              console.error('登录错误:', e.message);
              return false;
            }
          }

          async function userSign() {
            try {
              const res = await client.get('https://api.cloud.189.cn/mkt/userSign.action?rand=' + Date.now());
              if (res.data.isSign) {
                console.log('个人签到: 今日已签');
              } else {
                console.log('个人签到: 获得', res.data.netdiskBonus, 'M 空间');
              }
            } catch (e) {
              console.error('个人签到错误:', e.message);
            }
          }

          async function main() {
            const loggedIn = await login();
            if (loggedIn) {
              await userSign();
            }
          }

          main();
          JSEOF

      - name: Run
        env:
          TY_USERNAME: ${{ secrets.TY_USERNAME }}
          TY_PASSWORD: ${{ secrets.TY_PASSWORD }}
        run: node cloud189_sign.js
