name: Cloud189 Checkin
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  checkin:
    runs-on: ubuntu-latest
    environment: user
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests rsa

      - name: Download script
        run: |
          curl -L -o cloud189_checkin.py https://raw.githubusercontent.com/wes-lin/Cloud189Checkin/main/main.py

      - name: Run checkin
        env:
          CLOUD189_USER: ${{ secrets.TY_USERNAME }}
          CLOUD189_PWD: ${{ secrets.TY_PASSWORD }}
        run: |
          python cloud189_checkin.py
