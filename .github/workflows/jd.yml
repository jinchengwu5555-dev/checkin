name: JD Checkin
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install axios
        run: npm install axios

      - name: Write script
        run: |
          cat > jd_sign.js << 'JSEOF'
          const axios = require('axios');
          const cookie = process.env.JD_COOKIE;
          async function sign() {
            try {
              const res = await axios.post(
                'https://api.m.jd.com/client.action',
                'functionId=signBeanAct&appid=ld&body=%7B%22rnVersion%22%3A%228.1.0%22%2C%22channel%22%3A1%2C%22os%22%3A%22apple%22%2C%22enAli%22%3A%221%22%7D',
                {
                  headers: {
                    'Cookie': cookie,
                    'User-Agent': 'JDMobileIOS/13.0.2 (iPhone; iOS 16.0; Scale/3.00)',
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'Referer': 'https://bean.m.jd.com/',
                    'Host': 'api.m.jd.com'
                  }
                }
              );
              const data = res.data;
              console.log('京东签到结果:', JSON.stringify(data, null, 2));
              if (data.data) {
                const d = data.data;
                if (d.status === 1) {
                  console.log('签到成功！获得京豆:', d.signInfo && d.signInfo.signScore || 0);
                } else if (d.status === 2) {
                  console.log('今日已签到');
                } else {
                  console.log('签到状态:', d.status);
                }
              }
            } catch(e) {
              console.error('签到失败:', e.message);
            }
          }
          sign();
          JSEOF

      - name: JD Sign
        env:
          JD_COOKIE: ${{ secrets.JD_COOKIE }}
        run: node jd_sign.js
