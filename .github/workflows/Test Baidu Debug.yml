name: Test Baidu Debug

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests --break-system-packages
      - name: Debug
        env:
          BAIDUWP_COOKIE: ${{ secrets.BAIDUWP_COOKIE }}
        run: |
          python3 - << 'EOF'
          import os, requests

          cookie = os.environ.get('BAIDUWP_COOKIE', '')
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Cookie': cookie,
              'Referer': 'https://pan.baidu.com/disk/main',
          }

          r = requests.post(
              'https://pan.baidu.com/rest/2.0/membership/user?method=signin',
              headers=headers, timeout=15, allow_redirects=False
          )
          print(f"状态码: {r.status_code}")
          print(f"Content-Type: {r.headers.get('Content-Type', '')}")
          print(f"Location: {r.headers.get('Location', '无重定向')}")
          print(f"原始内容前500字符:\n{r.text[:500]}")
          EOF
