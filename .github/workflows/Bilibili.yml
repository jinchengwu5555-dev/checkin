name: Bilibili Checkin
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  checkin:
    runs-on: ubuntu-latest
    environment: user
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Create checkin script
        run: |
          cat > bilibili_checkin.py << 'EOF'
          import os
          import requests
          import json
          import time

          class BilibiliCheckin:
              def __init__(self, cookie):
                  self.cookie = cookie
                  self.headers = {
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                      'Cookie': cookie,
                      'Referer': 'https://www.bilibili.com/'
                  }

              def get_user_info(self):
                  """获取用户信息"""
                  try:
                      url = 'https://api.bilibili.com/x/web-interface/nav'
                      r = requests.get(url, headers=self.headers, timeout=10)
                      data = r.json()
                      
                      if data['code'] == 0:
                          uname = data['data']['uname']
                          print(f'用户: {uname}')
                          return True
                      else:
                          print(f'获取用户信息失败: {data.get("message")}')
                          return False
                  except Exception as e:
                      print(f'获取用户信息异常: {e}')
                      return False

              def live_checkin(self):
                  """直播签到"""
                  try:
                      url = 'https://api.live.bilibili.com/xlive/web-ucenter/v1/sign/DoSign'
                      r = requests.get(url, headers=self.headers, timeout=10)
                      data = r.json()
                      
                      if data['code'] == 0:
                          print(f'直播签到成功')
                          return True
                      else:
                          print(f'直播签到: {data.get("message", "未知错误")}')
                          return False
                  except Exception as e:
                      print(f'直播签到异常: {e}')
                      return False

              def coin_add(self, aid, num=1):
                  """投币"""
                  try:
                      url = 'https://api.bilibili.com/x/web-interface/coin/add'
                      data = {
                          'aid': aid,
                          'multiply': num,
                          'select_like': 1,
                          'cross_domain': 'true',
                          'csrf': self._get_csrf()
                      }
                      r = requests.post(url, headers=self.headers, data=data, timeout=10)
                      result = r.json()
                      
                      if result['code'] == 0:
                          print(f'投币成功: av{aid}')
                          return True
                      else:
                          print(f'投币: {result.get("message")}')
                          return False
                  except Exception as e:
                      print(f'投币异常: {e}')
                      return False

              def share_video(self, aid):
                  """分享视频"""
                  try:
                      url = 'https://api.bilibili.com/x/web-interface/share/add'
                      data = {
                          'aid': aid,
                          'csrf': self._get_csrf()
                      }
                      r = requests.post(url, headers=self.headers, data=data, timeout=10)
                      result = r.json()
                      
                      if result['code'] == 0:
                          print(f'分享成功: av{aid}')
                          return True
                      else:
                          print(f'分享: {result.get("message")}')
                          return False
                  except Exception as e:
                      print(f'分享异常: {e}')
                      return False

              def get_recommend_videos(self):
                  """获取推荐视频"""
                  try:
                      url = 'https://api.bilibili.com/x/web-interface/index/top/rcmd'
                      params = {'fresh_type': 3, 'ps': 10}
                      r = requests.get(url, headers=self.headers, params=params, timeout=10)
                      data = r.json()
                      
                      if data['code'] == 0 and data['data']['item']:
                          videos = [item['id'] for item in data['data']['item'] if 'id' in item]
                          return videos[:5]
                      return []
                  except Exception as e:
                      print(f'获取推荐视频异常: {e}')
                      return []

              def watch_video(self, aid, cid=None):
                  """观看视频（上报观看进度）"""
                  try:
                      if not cid:
                          url = f'https://api.bilibili.com/x/web-interface/view?aid={aid}'
                          r = requests.get(url, headers=self.headers, timeout=10)
                          data = r.json()
                          if data['code'] == 0:
                              cid = data['data']['cid']
                          else:
                              return False
                      
                      url = 'https://api.bilibili.com/x/click-interface/web/heartbeat'
                      data = {
                          'aid': aid,
                          'cid': cid,
                          'played_time': 60,
                          'csrf': self._get_csrf()
                      }
                      r = requests.post(url, headers=self.headers, data=data, timeout=10)
                      result = r.json()
                      
                      if result['code'] == 0:
                          print(f'观看视频成功: av{aid}')
                          return True
                      return False
                  except Exception as e:
                      print(f'观看视频异常: {e}')
                      return False

              def _get_csrf(self):
                  """从cookie中提取csrf token"""
                  try:
                      for item in self.cookie.split(';'):
                          if 'bili_jct' in item:
                              return item.split('=')[1].strip()
                  except:
                      pass
                  return ''

              def run(self):
                  """执行所有签到任务"""
                  print('=' * 50)
                  print('开始 Bilibili 签到任务')
                  print('=' * 50)
                  
                  if not self.get_user_info():
                      print('Cookie 无效，请更新')
                      return False
                  
                  print('\n--- 直播签到 ---')
                  self.live_checkin()
                  
                  print('\n--- 获取推荐视频 ---')
                  videos = self.get_recommend_videos()
                  
                  if videos:
                      print(f'获取到 {len(videos)} 个推荐视频')
                      
                      print('\n--- 观看视频 ---')
                      if videos:
                          self.watch_video(videos[0])
                      
                      print('\n--- 投币 ---')
                      for i, aid in enumerate(videos[:2]):
                          if self.coin_add(aid):
                              time.sleep(2)
                      
                      print('\n--- 分享视频 ---')
                      if videos:
                          self.share_video(videos[0])
                  
                  print('\n' + '=' * 50)
                  print('签到任务完成')
                  print('=' * 50)
                  return True

          if __name__ == '__main__':
              cookie = os.environ.get('BILIBILI_COOKIE')
              
              if not cookie:
                  print('未设置 BILIBILI_COOKIE')
                  exit(1)
              
              bili = BilibiliCheckin(cookie)
              success = bili.run()
              
              if not success:
                  exit(1)
          EOF

      - name: Run checkin
        env:
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
        run: |
          python bilibili_checkin.py
