name: NBA Schedule Debug

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: NBA Schedule Debug
        run: |
          python3 - << 'EOF'
          import requests
          from datetime import datetime, timezone, timedelta

          cst = timezone(timedelta(hours=8))
          headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          def get_standings_espn():
              try:
                  url = 'https://site.web.api.espn.com/apis/v2/sports/basketball/nba/standings'
                  params = {'season': 2025, 'seasontype': 2}
                  r = requests.get(url, params=params, timeout=10)
                  
                  if r.status_code != 200:
                      return None
                  
                  data = r.json()
                  all_teams = []
                  
                  for conf in data.get('children', []):
                      entries = conf.get('standings', {}).get('entries', [])
                      
                      for entry in entries:
                          team = entry.get('team', {})
                          stats = entry.get('stats', [])
                          
                          team_data = {
                              'id': str(team.get('id', '')),
                              'name': team.get('displayName', ''),
                          }
                          
                          for stat in stats:
                              stat_name = stat.get('name', '')
                              if stat_name == 'wins':
                                  team_data['wins'] = int(stat.get('value', 0))
                              elif stat_name == 'losses':
                                  team_data['losses'] = int(stat.get('value', 0))
                          
                          all_teams.append(team_data)
                  
                  for team in all_teams:
                      total = team.get('wins', 0) + team.get('losses', 0)
                      team['win_pct'] = team.get('wins', 0) / total if total > 0 else 0
                  
                  all_teams.sort(key=lambda x: x['win_pct'], reverse=True)
                  
                  ranking = {}
                  for i, team in enumerate(all_teams, 1):
                      ranking[team['id']] = i
                      print(f"  {i:2d}. {team['name']:30s} (ID: {team['id']})")
                  
                  print(f"\n✅ 共 {len(ranking)} 支球队")
                  return ranking
                  
              except Exception as e:
                  print(f"❌ 失败: {e}")
                  return None

          # 获取今日赛程
          r = requests.get(
              'https://cdn.nba.com/static/json/liveData/scoreboard/todaysScoreboard_00.json',
              headers=headers, timeout=10
          )
          data = r.json()
          games = data.get('scoreboard', {}).get('games', [])

          print("=" * 80)
          print("ESPN 积分榜:")
          print("=" * 80)
          ranking = get_standings_espn()

          print("\n" + "=" * 80)
          print("今日比赛球队 ID:")
          print("=" * 80)
          for g in games:
              away = g['awayTeam']
              home = g['homeTeam']
              away_id = str(away.get('teamId', ''))
              home_id = str(home.get('teamId', ''))
              away_name = f"{away['teamCity']} {away['teamName']}"
              home_name = f"{home['teamCity']} {home['teamName']}"
              
              away_rank = ranking.get(away_id, 'N/A') if ranking else 'N/A'
              home_rank = ranking.get(home_id, 'N/A') if ranking else 'N/A'
              
              print(f"\n{home_name} (ID: {home_id}) - 排名: #{home_rank}")
              print(f"  vs")
              print(f"{away_name} (ID: {away_id}) - 排名: #{away_rank}")
          EOF
