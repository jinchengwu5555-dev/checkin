name: NBA Schedule

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      result:
        description: "NBA赛程"
        value: ${{ jobs.fetch.outputs.result }}

jobs:
  fetch:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.fetch.outputs.result }}
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: NBA Schedule
        id: fetch
        run: |
          python3 - << 'EOF'
          import requests, os
          from datetime import datetime, timezone, timedelta

          cst = timezone(timedelta(hours=8))
          headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          # ESPN ID 到 NBA 官方 ID 的映射
          ESPN_TO_NBA_ID = {
              '1': '1610612737', '2': '1610612738', '3': '1610612740', '4': '1610612741',
              '5': '1610612739', '6': '1610612742', '7': '1610612743', '8': '1610612765',
              '9': '1610612744', '10': '1610612745', '11': '1610612754', '12': '1610612746',
              '13': '1610612747', '14': '1610612748', '15': '1610612749', '16': '1610612750',
              '17': '1610612751', '18': '1610612752', '19': '1610612753', '20': '1610612755',
              '21': '1610612756', '22': '1610612757', '23': '1610612758', '24': '1610612759',
              '25': '1610612760', '26': '1610612762', '27': '1610612764', '28': '1610612761',
              '29': '1610612763', '30': '1610612766',
          }

          def et_to_cst(utc_str):
              try:
                  dt = datetime.fromisoformat(utc_str.replace('Z', '+00:00'))
                  return dt.astimezone(cst).strftime('%H:%M')
              except:
                  return ''

          def get_standings_espn():
              try:
                  url = 'https://site.web.api.espn.com/apis/v2/sports/basketball/nba/standings'
                  r = requests.get(url, params={'season': 2025, 'seasontype': 2}, timeout=10)
                  
                  if r.status_code != 200:
                      return None
                  
                  all_teams = []
                  for conf in r.json().get('children', []):
                      for entry in conf.get('standings', {}).get('entries', []):
                          team = entry.get('team', {})
                          espn_id = str(team.get('id', ''))
                          nba_id = ESPN_TO_NBA_ID.get(espn_id)
                          if not nba_id:
                              continue
                          
                          team_data = {'nba_id': nba_id, 'name': team.get('displayName', '')}
                          for stat in entry.get('stats', []):
                              if stat.get('name') == 'wins':
                                  team_data['wins'] = int(stat.get('value', 0))
                              elif stat.get('name') == 'losses':
                                  team_data['losses'] = int(stat.get('value', 0))
                          all_teams.append(team_data)
                  
                  # 自己计算胜率并排序
                  for team in all_teams:
                      total = team.get('wins', 0) + team.get('losses', 0)
                      team['win_pct'] = team.get('wins', 0) / total if total > 0 else 0
                  
                  all_teams.sort(key=lambda x: (x['win_pct'], x.get('wins', 0)), reverse=True)
                  
                  ranking = {team['nba_id']: i for i, team in enumerate(all_teams, 1)}
                  print(f"✅ 积分榜加载成功，共 {len(ranking)} 支球队")
                  return ranking
              except Exception as e:
                  print(f"⚠️ 积分榜获取失败: {e}")
                  return None

          def calc_hot_games(games, ranking):
              if not ranking:
                  return set(), {}
              scored, rank_info = [], {}
              for g in games:
                  away_id = str(g['awayTeam'].get('teamId', ''))
                  home_id = str(g['homeTeam'].get('teamId', ''))
                  r_away = ranking.get(away_id, 99)
                  r_home = ranking.get(home_id, 99)
                  score = 0 if r_away == 99 or r_home == 99 else (31 - r_away) + (31 - r_home) + (20 if r_away <= 10 and r_home <= 10 else 0)
                  game_id = str(g['gameId'])
                  scored.append((score, game_id))
                  rank_info[game_id] = (r_away, r_home)
              scored.sort(reverse=True)
              return {gid for score, gid in scored[:2] if score > 0}, rank_info

          r = requests.get('https://cdn.nba.com/static/json/liveData/scoreboard/todaysScoreboard_00.json', headers=headers, timeout=10)
          data = r.json()
          games = data.get('scoreboard', {}).get('games', [])
          game_date = data.get('scoreboard', {}).get('gameDate', '')

          ranking = get_standings_espn()
          hot_ids, rank_info = calc_hot_games(games, ranking)
          use_rankings = ranking is not None

          finished, ongoing, upcoming = [], [], []
          for g in games:
              away, home = g['awayTeam'], g['homeTeam']
              status = g.get('gameStatus', 1)
              game_id = str(g['gameId'])
              r_away, r_home = rank_info.get(game_id, (99, 99))
              
              info = {
                  'home': f"{home['teamCity']} {home['teamName']}",
                  'away': f"{away['teamCity']} {away['teamName']}",
                  'home_score': home.get('score', 0),
                  'away_score': away.get('score', 0),
                  'status_txt': g.get('gameStatusText', '').strip(),
                  'start_cst': et_to_cst(g.get('gameTimeUTC', '')),
                  'r_home': r_home, 'r_away': r_away,
                  'is_hot': game_id in hot_ids,
              }
              (finished if status == 3 else ongoing if status == 2 else upcoming).append(info)

          sections = [f"**赛事日期:** {game_date}\n"]

          if ongoing:
              block = ['### 🔴 进行中\n', '| 主场 | 客场 | 比分 | 节次 |', '|:---|:---|:---:|:---:|']
              for g in ongoing:
                  hot = '🔥 ' if g['is_hot'] else ''
                  hr = f" (#{g['r_home']})" if use_rankings and g['r_home'] != 99 else ''
                  ar = f" (#{g['r_away']})" if use_rankings and g['r_away'] != 99 else ''
                  block.append(f"| {hot}**{g['home']}**{hr} | **{g['away']}**{ar} | {g['home_score']} - {g['away_score']} | {g['status_txt']} |")
              sections.append('\n'.join(block))

          if upcoming:
              block = ['### 🕐 今日待开赛\n', '| 主场 | 客场 | 开赛时间(北京) |', '|:---|:---|:---:|']
              for g in upcoming:
                  hot = '🔥 ' if g['is_hot'] else ''
                  hr = f" (#{g['r_home']})" if use_rankings and g['r_home'] != 99 else ''
                  ar = f" (#{g['r_away']})" if use_rankings and g['r_away'] != 99 else ''
                  time = g['start_cst'] or '-'
                  block.append(f"| {hot}**{g['home']}**{hr} | **{g['away']}**{ar} | {time} |")
              sections.append('\n'.join(block))

          if finished:
              block = ['### ✅ 已结束\n', '| 主场 | 客场 | 比分 | 结果 |', '|:---|:---|:---:|:---:|']
              for g in finished:
                  hot = '🔥 ' if g['is_hot'] else ''
                  winner = g['home'] if g['home_score'] > g['away_score'] else g['away']
                  hr = f" (#{g['r_home']})" if use_rankings and g['r_home'] != 99 else ''
                  ar = f" (#{g['r_away']})" if use_rankings and g['r_away'] != 99 else ''
                  hf = f"**{g['home']}**" if g['home'] == winner else g['home']
                  af = f"**{g['away']}**" if g['away'] == winner else g['away']
                  block.append(f"| {hot}{hf}{hr} | {af}{ar} | {g['home_score']} - {g['away_score']} | 🏆 **{winner}** |")
              sections.append('\n'.join(block))

          if not games:
              sections.append('今日暂无比赛')

          if use_rankings and hot_ids:
              sections.append(f'> 🔥 热门: 基于胜率总排名，前10强对决额外加权（已获取 {len(ranking)}/30 支球队）')
          elif not use_rankings:
              sections.append('> ⚠️ 积分榜数据暂不可用，本次不标注热门场次')

          result = '\n\n'.join(sections)
          print(result)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"result<<ENDNBA\n{result}\nENDNBA\n")
          EOF
