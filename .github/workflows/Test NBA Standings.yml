name: Test NBA Standings Sources

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 --break-system-packages

      - name: Test NBA Standings Sources
        run: |
          python3 - << 'EOF'
          import requests, json, re
          from bs4 import BeautifulSoup

          ua = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'

          print("=" * 100)
          print("测试 NBA 30 支球队积分榜数据源")
          print("=" * 100)

          # ========================================
          # 1. ESPN API - 总排名
          # ========================================
          print("\n【1】ESPN API - 30 支球队总排名")
          try:
              url = 'https://site.web.api.espn.com/apis/v2/sports/basketball/nba/standings'
              params = {'season': 2025, 'seasontype': 2}
              r = requests.get(url, params=params, timeout=10)
              print(f"状态码: {r.status_code}")
              
              if r.status_code == 200:
                  data = r.json()
                  all_teams = []
                  
                  for conf in data.get('children', []):
                      conf_name = conf.get('name', '')
                      entries = conf.get('standings', {}).get('entries', [])
                      
                      for entry in entries:
                          team = entry.get('team', {})
                          stats = entry.get('stats', [])
                          
                          # 提取统计数据
                          team_data = {
                              'conference': conf_name,
                              'name': team.get('displayName', ''),
                              'abbr': team.get('abbreviation', ''),
                          }
                          
                          for stat in stats:
                              stat_name = stat.get('name', '')
                              if stat_name == 'wins':
                                  team_data['wins'] = stat.get('value', 0)
                              elif stat_name == 'losses':
                                  team_data['losses'] = stat.get('value', 0)
                              elif stat_name == 'rank':
                                  team_data['conf_rank'] = stat.get('value', 0)
                          
                          all_teams.append(team_data)
                  
                  print(f"✅ 成功获取 {len(all_teams)} 支球队")
                  
                  # 按胜率排序计算总排名
                  for team in all_teams:
                      total = team.get('wins', 0) + team.get('losses', 0)
                      team['win_pct'] = team.get('wins', 0) / total if total > 0 else 0
                  
                  all_teams.sort(key=lambda x: x['win_pct'], reverse=True)
                  
                  print("\n总排名前 10:")
                  for i, team in enumerate(all_teams[:10], 1):
                      print(f"  {i:2d}. {team['name']:25s} ({team['abbr']:3s}) - {team.get('wins', 0):2d}胜{team.get('losses', 0):2d}负 ({team['win_pct']:.3f})")
                  
                  print("\n总排名后 5:")
                  for i, team in enumerate(all_teams[-5:], len(all_teams)-4):
                      print(f"  {i:2d}. {team['name']:25s} ({team['abbr']:3s}) - {team.get('wins', 0):2d}胜{team.get('losses', 0):2d}负 ({team['win_pct']:.3f})")
              else:
                  print(f"❌ 请求失败")
          except Exception as e:
              print(f"❌ 异常: {e}")

          # ========================================
          # 2. 虎扑 - 战绩排名
          # ========================================
          print("\n【2】虎扑 - 战绩排名")
          try:
              # 尝试多个可能的 URL
              urls = [
                  'https://nba.hupu.com/stats/teams',
                  'https://nba.hupu.com/standings',
                  'https://nba.hupu.com/stats/standings',
              ]
              
              for test_url in urls:
                  print(f"\n尝试: {test_url}")
                  headers = {
                      'User-Agent': ua,
                      'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8',
                      'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
                      'Referer': 'https://www.hupu.com/',
                  }
                  r = requests.get(test_url, headers=headers, timeout=15)
                  print(f"状态码: {r.status_code}")
                  
                  if r.status_code == 200:
                      soup = BeautifulSoup(r.text, 'html.parser')
                      
                      # 查找包含"胜"、"负"、"胜率"等关键词的表格
                      tables = soup.find_all('table')
                      print(f"找到 {len(tables)} 个表格")
                      
                      for idx, table in enumerate(tables):
                          # 检查表头
                          headers_row = table.find('tr')
                          if headers_row:
                              header_text = headers_row.get_text()
                              if any(kw in header_text for kw in ['胜', '负', '胜率', '排名']):
                                  print(f"\n表格 {idx + 1} 可能是积分榜:")
                                  rows = table.find_all('tr')[:6]
                                  for i, row in enumerate(rows):
                                      cols = row.find_all(['td', 'th'])
                                      text = ' | '.join([col.get_text(strip=True) for col in cols[:6]])
                                      print(f"  {text}")
                      
                      # 查找包含球队名称的文本
                      team_keywords = ['骑士', '凯尔特人', '热火', '魔术', '雄鹿', '湖人', '勇士']
                      found_teams = []
                      for kw in team_keywords:
                          if kw in r.text:
                              found_teams.append(kw)
                      
                      if found_teams:
                          print(f"\n✅ 页面包含球队: {', '.join(found_teams)}")
                      else:
                          print(f"\n⚠️ 未找到球队关键词")
                      
                      break
          except Exception as e:
              print(f"❌ 异常: {e}")

          # ========================================
          # 3. 懂球帝 - 详细解析
          # ========================================
          print("\n【3】懂球帝 NBA 积分榜")
          try:
              url = 'https://www.dongqiudi.com/data/nba/team'
              headers = {
                  'User-Agent': ua,
                  'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
              }
              r = requests.get(url, headers=headers, timeout=10)
              print(f"状态码: {r.status_code}")
              
              if r.status_code == 200:
                  soup = BeautifulSoup(r.text, 'html.parser')
                  
                  # 查找表格
                  tables = soup.find_all('table')
                  print(f"找到 {len(tables)} 个表格")
                  
                  if tables:
                      print("\n第一个表格前 5 行:")
                      rows = tables[0].find_all('tr')[:5]
                      for i, row in enumerate(rows, 1):
                          cols = row.find_all(['td', 'th'])
                          text = ' | '.join([col.get_text(strip=True) for col in cols[:6]])
                          print(f"  {i}. {text}")
                  
                  # 查找包含排名的元素
                  rank_elements = soup.find_all(text=re.compile(r'\d+\s*胜'))
                  if rank_elements:
                      print(f"\n找到 {len(rank_elements)} 个包含胜负记录的元素")
                      for elem in rank_elements[:5]:
                          print(f"  - {elem.strip()[:50]}")
              else:
                  print(f"❌ 请求失败")
          except Exception as e:
              print(f"❌ 异常: {e}")

          # ========================================
          # 4. 尝试虎扑 API
          # ========================================
          print("\n【4】虎扑可能的 API 接口")
          try:
              api_urls = [
                  'https://games.mobileapi.hupu.com/1/7.5.60/nba/getTeamStandings',
                  'https://games.mobileapi.hupu.com/nba/standings',
                  'https://m.hupu.com/nba/standings.json',
              ]
              
              for api_url in api_urls:
                  print(f"\n尝试: {api_url}")
                  headers = {
                      'User-Agent': ua,
                      'Referer': 'https://m.hupu.com/',
                  }
                  try:
                      r = requests.get(api_url, headers=headers, timeout=10)
                      print(f"状态码: {r.status_code}")
                      
                      if r.status_code == 200:
                          try:
                              data = r.json()
                              print(f"✅ 成功获取 JSON 数据")
                              print(f"数据键: {list(data.keys())[:10]}")
                              
                              # 尝试找到球队数据
                              def find_teams(obj, depth=0):
                                  if depth > 3:
                                      return []
                                  if isinstance(obj, dict):
                                      for key, value in obj.items():
                                          if 'team' in key.lower() or 'standing' in key.lower():
                                              return value
                                          result = find_teams(value, depth + 1)
                                          if result:
                                              return result
                                  elif isinstance(obj, list) and obj:
                                      return find_teams(obj[0], depth + 1)
                                  return []
                              
                              teams = find_teams(data)
                              if teams:
                                  print(f"找到球队数据，数量: {len(teams) if isinstance(teams, list) else '未知'}")
                          except:
                              print(f"⚠️ 非 JSON 格式，内容前 200 字符:")
                              print(f"  {r.text[:200]}")
                  except Exception as e:
                      print(f"请求失败: {str(e)[:50]}")
          except Exception as e:
              print(f"❌ 异常: {e}")

          print("\n" + "=" * 100)
          print("测试完成")
          print("=" * 100)
          EOF
