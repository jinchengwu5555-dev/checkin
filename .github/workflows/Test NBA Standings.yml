name: Test TheSportsDB

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests --break-system-packages
      - name: Test
        run: |
          python3 - << 'EOF'
          import requests

          ua = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'

          # thesportsdb 返回了200，看原始内容
          r = requests.get(
              'https://www.thesportsdb.com/api/v1/json/3/lookuptable.php?l=4387&s=2024-2025',
              headers={'User-Agent': ua}, timeout=8
          )
          print(f"状态码: {r.status_code}")
          print(f"Content-Type: {r.headers.get('Content-Type', '')}")
          print(f"原始内容前500字符:\n{r.text[:500]}")
          print("---")

          # 同时测试 thesportsdb 免费key=1的接口
          r2 = requests.get(
              'https://www.thesportsdb.com/api/v1/json/1/lookuptable.php?l=4387&s=2024-2025',
              headers={'User-Agent': ua}, timeout=8
          )
          print(f"key=1 状态码: {r2.status_code}")
          print(f"key=1 内容前500字符:\n{r2.text[:500]}")
          EOF
