name: Test NBA Standings

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests --break-system-packages
      - name: Test
        run: |
          python3 - << 'EOF'
          import requests

          headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          # 测试几个候选接口
          urls = [
              'https://cdn.nba.com/static/json/staticData/teamStandings.json',
              'https://cdn.nba.com/static/json/liveData/standings/standings_00.json',
              'https://api.sportradar.com/nba/trial/v8/en/seasons/2025/REG/standings.json',
              'https://data.nba.net/10s/prod/v1/current/standings_all.json',
              'https://data.nba.net/prod/v1/current/standings_all.json',
          ]

          for url in urls:
              try:
                  r = requests.get(url, headers=headers, timeout=8)
                  print(f"[{r.status_code}] {url}")
                  if r.status_code == 200:
                      data = r.json()
                      print(f"  顶层 keys: {list(data.keys())[:5]}")
              except Exception as e:
                  print(f"[ERR] {url} → {e}")
          EOF
