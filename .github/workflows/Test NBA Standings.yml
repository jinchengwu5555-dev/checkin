name: Test NBA.com JSON Extraction

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Extract NBA.com Standings
        run: |
          python3 - << 'EOF'
          import requests, json, re

          ua = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'

          print("=" * 80)
          print("从 NBA.com 提取积分榜数据")
          print("=" * 80)

          try:
              url = 'https://www.nba.com/standings'
              headers = {
                  'User-Agent': ua,
                  'Accept': 'text/html,application/xhtml+xml,application/xml',
              }
              r = requests.get(url, headers=headers, timeout=15)
              
              # 提取 __NEXT_DATA__ JSON
              match = re.search(r'<script id="__NEXT_DATA__" type="application/json">(.*?)</script>', r.text, re.DOTALL)
              
              if match:
                  data = json.loads(match.group(1))
                  print("✅ 成功提取 JSON 数据\n")
                  
                  # 探索数据结构
                  props = data.get('props', {})
                  page_props = props.get('pageProps', {})
                  
                  print("Props 键:", list(props.keys())[:10])
                  print("PageProps 键:", list(page_props.keys())[:10])
                  
                  # 尝试找到 standings 数据
                  def find_standings(obj, depth=0, max_depth=5):
                      if depth > max_depth:
                          return None
                      
                      if isinstance(obj, dict):
                          # 查找包含 standings 的键
                          for key in obj.keys():
                              if 'standing' in key.lower():
                                  print(f"\n找到可能的 standings 键: {key}")
                                  print(f"数据类型: {type(obj[key])}")
                                  if isinstance(obj[key], (list, dict)):
                                      print(f"内容预览: {str(obj[key])[:200]}")
                                  return obj[key]
                          
                          # 递归搜索
                          for key, value in obj.items():
                              result = find_standings(value, depth + 1, max_depth)
                              if result is not None:
                                  return result
                      
                      elif isinstance(obj, list) and obj:
                          return find_standings(obj[0], depth + 1, max_depth)
                      
                      return None
                  
                  standings_data = find_standings(data)
                  
                  if standings_data:
                      print("\n✅ 找到 standings 数据!")
                      
                      # 尝试解析球队信息
                      if isinstance(standings_data, list):
                          print(f"\nStandings 是列表，长度: {len(standings_data)}")
                          if standings_data:
                              print(f"第一项的键: {list(standings_data[0].keys()) if isinstance(standings_data[0], dict) else '不是字典'}")
                              print(f"第一项内容: {standings_data[0]}")
                      elif isinstance(standings_data, dict):
                          print(f"\nStandings 是字典，键: {list(standings_data.keys())[:10]}")
                  else:
                      print("\n⚠️ 未找到 standings 数据，尝试其他方法...")
                      
                      # 打印所有可能相关的键
                      def print_all_keys(obj, prefix="", depth=0, max_depth=3):
                          if depth > max_depth:
                              return
                          if isinstance(obj, dict):
                              for key in obj.keys():
                                  print(f"{prefix}{key}: {type(obj[key])}")
                                  if isinstance(obj[key], (dict, list)) and depth < max_depth:
                                      print_all_keys(obj[key], prefix + "  ", depth + 1, max_depth)
                      
                      print("\n所有数据结构:")
                      print_all_keys(page_props)
                  
              else:
                  print("❌ 未找到 __NEXT_DATA__ JSON")
                  
          except Exception as e:
              print(f"❌ 失败: {e}")
              import traceback
              traceback.print_exc()

          print("\n" + "=" * 80)
          EOF
