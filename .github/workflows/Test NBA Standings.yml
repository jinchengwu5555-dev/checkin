name: Test CN NBA API

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests --break-system-packages
      - name: Test
        run: |
          python3 - << 'EOF'
          import requests, json

          ua = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'

          tests = [
              # 新浪体育 NBA 积分榜 JSON 接口
              ('新浪-积分榜', 'https://basketball.sports.sina.com.cn/nba/standing',
               {'User-Agent': ua, 'Referer': 'https://sports.sina.com.cn/'}),

              ('新浪-API', 'https://matchweb.sports.sina.com.cn/matchPosition/leagueStandings?competitionId=NBAB&v=2',
               {'User-Agent': ua, 'Referer': 'https://sports.sina.com.cn/'}),

              # 腾讯体育 NBA 积分榜 JSON 接口
              ('腾讯-API1', 'https://matchweb.sports.qq.com/kbs/list?from=NBA&type=team_standing&date=&callback=',
               {'User-Agent': ua, 'Referer': 'https://sports.qq.com/'}),

              ('腾讯-API2', 'https://sportsapi.sports.qq.com/standard/getNBAStandings',
               {'User-Agent': ua, 'Referer': 'https://sports.qq.com/'}),

              # 新浪 NBA JSON
              ('新浪-NBA-JSON', 'https://hq.sinajs.cn/list=nba_standing',
               {'User-Agent': ua, 'Referer': 'https://sports.sina.com.cn/'}),

              # PP体育/苏宁
              ('PP体育', 'https://api.ppsports.com/v1/basketball/nba/standing?season=2025',
               {'User-Agent': ua}),
          ]

          for name, url, hdrs in tests:
              try:
                  r = requests.get(url, headers=hdrs, timeout=8)
                  print(f"[{r.status_code}] {name}")
                  if r.status_code == 200:
                      text = r.text[:300]
                      hits = sum(1 for kw in ['骑士','勇士','湖人','凯尔特','雄鹿','掘金','Cavaliers','Warriors','Lakers'] if kw in r.text)
                      print(f"  关键词命中: {hits}  内容前200字符: {text[:200]}")
              except Exception as e:
                  print(f"[ERR] {name}: {str(e)[:80]}")
          EOF
