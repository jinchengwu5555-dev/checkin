name: Deep Dive NBA.com Data

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Extract Full Standings Data
        run: |
          python3 - << 'EOF'
          import requests, json, re

          ua = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'

          try:
              url = 'https://www.nba.com/standings'
              r = requests.get(url, headers={'User-Agent': ua, 'Accept': 'text/html'}, timeout=15)
              
              match = re.search(r'<script id="__NEXT_DATA__" type="application/json">(.*?)</script>', r.text, re.DOTALL)
              
              if match:
                  data = json.loads(match.group(1))
                  
                  # 深度搜索所有包含 team 或 conference 的数据
                  def deep_search(obj, path="", depth=0, max_depth=10):
                      if depth > max_depth:
                          return
                      
                      if isinstance(obj, dict):
                          for key, value in obj.items():
                              new_path = f"{path}.{key}" if path else key
                              
                              # 查找包含球队信息的键
                              if any(keyword in key.lower() for keyword in ['team', 'conference', 'division', 'record', 'win', 'loss']):
                                  if isinstance(value, (list, dict)):
                                      print(f"\n路径: {new_path}")
                                      print(f"类型: {type(value)}")
                                      if isinstance(value, list) and value:
                                          print(f"列表长度: {len(value)}")
                                          print(f"第一项: {str(value[0])[:300]}")
                                      elif isinstance(value, dict):
                                          print(f"字典键: {list(value.keys())[:10]}")
                                          # 如果字典包含 teamId 或 teamName，打印详细信息
                                          if any(k in value for k in ['teamId', 'teamName', 'teamCity']):
                                              print(f"详细内容: {value}")
                              
                              deep_search(value, new_path, depth + 1, max_depth)
                      
                      elif isinstance(obj, list):
                          for i, item in enumerate(obj[:3]):  # 只检查前3项
                              deep_search(item, f"{path}[{i}]", depth + 1, max_depth)
                  
                  print("=" * 80)
                  print("深度搜索球队相关数据")
                  print("=" * 80)
                  deep_search(data)
                  
              else:
                  print("❌ 未找到 JSON 数据")
                  
          except Exception as e:
              print(f"❌ 失败: {e}")
              import traceback
              traceback.print_exc()
          EOF
