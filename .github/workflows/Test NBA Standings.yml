name: NBA Schedule

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      result:
        description: "NBA赛程"
        value: ${{ jobs.fetch.outputs.result }}

jobs:
  fetch:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.fetch.outputs.result }}
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: NBA Schedule
        id: fetch
        run: |
          python3 - << 'EOF'
          import requests, os
          from datetime import datetime, timezone, timedelta

          cst = timezone(timedelta(hours=8))

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Referer': 'https://www.nba.com/',
              'Origin': 'https://www.nba.com',
          }

          def et_to_cst(utc_str):
              try:
                  dt = datetime.fromisoformat(utc_str.replace('Z', '+00:00'))
                  return dt.astimezone(cst).strftime('%H:%M')
              except:
                  return ''

          def get_standings_nba_official():
              """从 NBA 官方 API 获取积分榜，返回 {team_id: rank} 字典"""
              try:
                  url = 'https://stats.nba.com/stats/leaguestandingsv3'
                  params = {
                      'LeagueID': '00',
                      'Season': '2024-25',
                      'SeasonType': 'Regular Season'
                  }
                  headers_nba = {
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                      'Referer': 'https://www.nba.com/',
                      'Origin': 'https://www.nba.com',
                      'Accept': 'application/json',
                      'x-nba-stats-origin': 'stats',
                      'x-nba-stats-token': 'true'
                  }
                  
                  r = requests.get(url, params=params, headers=headers_nba, timeout=15)
                  
                  if r.status_code != 200:
                      print(f"⚠️ NBA 官方 API 返回 {r.status_code}")
                      return None
                  
                  data = r.json()
                  standings = data.get('resultSets', [{}])[0]
                  headers_list = standings.get('headers', [])
                  rows = standings.get('rowSet', [])
                  
                  if not rows:
                      return None
                  
                  # 找到关键列的索引
                  team_id_idx = headers_list.index('TeamID')
                  team_name_idx = headers_list.index('TeamName')
                  wins_idx = headers_list.index('WINS')
                  losses_idx = headers_list.index('LOSSES')
                  win_pct_idx = headers_list.index('WinPCT')
                  
                  # 收集所有球队数据
                  all_teams = []
                  for row in rows:
                      all_teams.append({
                          'team_id': str(row[team_id_idx]),
                          'name': row[team_name_idx],
                          'wins': row[wins_idx],
                          'losses': row[losses_idx],
                          'win_pct': row[win_pct_idx]
                      })
                  
                  # 按胜率排序
                  all_teams.sort(key=lambda x: x['win_pct'], reverse=True)
                  
                  # 生成排名字典
                  ranking = {}
                  for i, team in enumerate(all_teams, 1):
                      ranking[team['team_id']] = i
                  
                  print(f"✅ NBA 官方积分榜加载成功，共 {len(ranking)} 支球队")
                  return ranking
                  
              except Exception as e:
                  print(f"⚠️ NBA 官方 API 获取失败: {e}")
                  return None

          def calc_hot_games(games, ranking):
              """计算热门比赛"""
              if ranking is None:
                  return set(), {}
              
              scored = []
              rank_info = {}
              
              for g in games:
                  away_id = str(g['awayTeam'].get('teamId', ''))
                  home_id = str(g['homeTeam'].get('teamId', ''))
                  r_away = ranking.get(away_id, 99)
                  r_home = ranking.get(home_id, 99)
                  
                  if r_away == 99 or r_home == 99:
                      score = 0
                  else:
                      # 排名越靠前分数越高
                      score = (31 - r_away) + (31 - r_home)
                      # 前10强对决额外加分
                      if r_away <= 10 and r_home <= 10:
                          score += 20
                  
                  game_id = str(g['gameId'])
                  scored.append((score, game_id))
                  rank_info[game_id] = (r_away, r_home)
              
              # 选出分数最高的2场比赛
              scored.sort(key=lambda x: x[0], reverse=True)
              hot_ids = {gid for score, gid in scored[:2] if score > 0}
              
              return hot_ids, rank_info

          # 获取今日赛程
          r = requests.get(
              'https://cdn.nba.com/static/json/liveData/scoreboard/todaysScoreboard_00.json',
              headers=headers, timeout=10
          )
          data = r.json()
          games = data.get('scoreboard', {}).get('games', [])
          game_date = data.get('scoreboard', {}).get('gameDate', '')

          # 获取积分榜
          ranking = get_standings_nba_official()
          hot_ids, rank_info = calc_hot_games(games, ranking)
          use_rankings = ranking is not None

          # 分类比赛
          finished, ongoing, upcoming = [], [], []

          for g in games:
