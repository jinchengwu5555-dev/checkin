name: Test NBA Standings from Scoreboard

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests --break-system-packages
      - name: Test
        run: |
          python3 - << 'EOF'
          import requests, json

          headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          # 看看 todaysScoreboard 里每支球队有哪些字段
          r = requests.get(
              'https://cdn.nba.com/static/json/liveData/scoreboard/todaysScoreboard_00.json',
              headers=headers, timeout=10
          )
          data  = r.json()
          games = data['scoreboard']['games']

          if games:
              g = games[0]
              print("awayTeam 全部字段:")
              print(json.dumps(g['awayTeam'], indent=2, ensure_ascii=False))
              print("\nhomeTeam 全部字段:")
              print(json.dumps(g['homeTeam'], indent=2, ensure_ascii=False))
          else:
              print("今日无比赛，打印 scoreboard 顶层结构:")
              print(json.dumps(data['scoreboard'], indent=2, ensure_ascii=False)[:1000])
          EOF
