name: Test Cloud189 v3

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios

      - name: Test
        run: |
          cat << 'EOF' > test.js
          const axios = require('axios');

          const client = axios.create({
            timeout: 15000,
            headers: {
              'User-Agent': 'Mozilla/5.0 (Linux; Android 11; Pixel 5) AppleWebKit/537.36',
            },
            maxRedirects: 5,
            validateStatus: s => s < 500,
          });

          (async () => {
            // 测试几个不同的登录入口
            const urls = [
              'https://open.e.189.cn/api/logbox/oauth2/unifyAccountLogin.do?appId=cloud&clientId=538135150693412&returnUrl=https://m.cloud.189.cn/zhuanti/2021/shakeLottery/index.html',
              'https://cloud.189.cn/api/portal/loginUrl.action?redirectURL=https://cloud.189.cn/web/login.html',
              'https://cloud.189.cn/web/login.html',
            ];

            for (const url of urls) {
              try {
                const r = await client.get(url);
                console.log(`\n=== ${url.substring(0, 60)} ===`);
                console.log('状态码:', r.status);
                console.log('Content-Type:', r.headers['content-type']);
                const body = typeof r.data === 'object' ? JSON.stringify(r.data) : String(r.data);
                console.log('响应前800字符:', body.substring(0, 800));
              } catch(e) {
                console.log(`\n=== ${url.substring(0, 60)} ===`);
                console.log('错误:', e.message);
              }
            }
          })();
          EOF
          node test.js
