name: Test Cloud189 Checkin

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests dailycheckin --break-system-packages

      - name: Test Cloud189
        env:
          CLOUD189_USERNAME: ${{ secrets.CLOUD189_USERNAME }}
          CLOUD189_PASSWORD: ${{ secrets.CLOUD189_PASSWORD }}
        run: |
          python3 - << 'EOF'
          import os, json, subprocess

          username = os.environ.get('CLOUD189_USERNAME', '')
          password = os.environ.get('CLOUD189_PASSWORD', '')

          if not username or not password:
              print("❌ 未设置 CLOUD189_USERNAME 或 CLOUD189_PASSWORD")
              exit(0)

          # 写到 dailycheckin 能找到的路径
          config_path = os.path.join(os.getcwd(), 'config.json')

          # 读取现有 config.json（如果有），否则新建
          try:
              with open(config_path, 'r') as f:
                  config = json.load(f)
          except Exception:
              config = {}

          config['CLOUD189'] = [
              {
                  "username": username,
                  "password": password
              }
          ]

          with open(config_path, 'w') as f:
              json.dump(config, f, indent=2)

          print(f"config.json 写入路径: {config_path}")
          print(f"config.json 内容（密码已隐藏）: CLOUD189 账号 = {username[:3]}***")

          proc = subprocess.run(['dailycheckin'], capture_output=True, text=True)
          output = proc.stdout + proc.stderr

          print("=== 完整输出 ===")
          print(output)
          EOF
