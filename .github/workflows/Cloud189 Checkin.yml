name: Test Cloud189 Key

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install dailycheckin --break-system-packages
      - name: Find key
        run: |
          python3 - << 'EOF'
          import dailycheckin, os, inspect

          # 打印 dailycheckin 包的位置
          pkg_path = os.path.dirname(inspect.getfile(dailycheckin))
          print(f"包路径: {pkg_path}")

          # 列出所有文件
          for root, dirs, files in os.walk(pkg_path):
              for f in files:
                  print(os.path.join(root, f))
          EOF

      - name: Cat checkin files
        run: |
          # 找天翼相关文件
          find /opt/hostedtoolcache -name "*.py" 2>/dev/null | xargs grep -l -i "cloud189\|天翼\|189" 2>/dev/null | head -5
          
          # 找 key 注册表
          find /opt/hostedtoolcache -name "*.py" 2>/dev/null | xargs grep -l "CHECKIN_MAP\|checkin_map\|register" 2>/dev/null | head -5
