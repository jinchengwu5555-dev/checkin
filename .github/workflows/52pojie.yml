name: 52Pojie Pro 2026

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  pojie_task:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Automation
        env:
          POJIE_COOKIES: ${{ secrets.POJIE_COOKIES }}
          PUSH_KEY: ${{ secrets.PUSH_KEY }}
        run: |
          npm install axios
          
          cat << 'EOF' > index.js
          const axios = require('axios');

          const cookies = process.env.POJIE_COOKIES ? process.env.POJIE_COOKIES.split('@') : [];
          const pushKey = process.env.PUSH_KEY;
          let finalReport = ["🏴‍☠️ 吾爱破解资产看板"];

          async function executeTask(cookie, index) {
            const api = axios.create({
              timeout: 20000,
              headers: {
                'Cookie': cookie.trim(),
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
                'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8',
                'Connection': 'keep-alive'
              }
            });

            let report = [];
            try {
              // 1. 访问个人主页获取数据
              const homeRes = await api.get('https://www.52pojie.cn/home.php?mod=spacecp&ac=credit&showuser=1');
              const html = homeRes.data;

              // 检查是否被 WAF 拦截 (验证码页面)
              if (html.includes('安全验证') || html.includes('Cloudflare')) {
                report.push("❌ 访问受限: GitHub IP 被 52 拦截，触发了验证码");
                return report.join('\n');
              }

              // 提取用户名
              const userNameMatch = html.match(/class=\"vwmy\">(.+?)<\/a>/);
              const userName = userNameMatch ? userNameMatch[1] : "未知会员";
              report.push("掘友: " + userName);

              if (userName === "未知会员") {
                report.push("❌ 登录失败: Cookie 已失效或格式错误");
                return report.join('\n');
              }

              // 2. 执行签到任务
              const checkInRes = await api.get('https://www.52pojie.cn/home.php?mod=task&do=apply&id=2');
              const statusMsg = checkInRes.data;

              if (statusMsg.includes("任务已成功完成")) {
                report.push("✅ 签到成功: 经验 +1 / 吾爱币 +1");
              } else {
                report.push("ℹ️ 签到状态: 今日已完成或任务暂不可用");
              }

              // 3. 资产统计 (仿照掘金图片样式)
              const coin = (html.match(/吾爱币: <\/em>(.+?)&nbsp;/) || [])[1] || "0";
              const credit = (html.match(/积分: <\/em>(.+?)&nbsp;/) || [])[1] || "0";
              const prestige = (html.match(/威望: <\/em>(.+?) <\/li>/) || [])[1] || "0";

              report.push("当前吾爱币: " + coin);
              report.push("当前总积分: " + credit);
              report.push("当前威望值: " + prestige);
              // 趣味映射：把吾爱币当作 Bug 数 (模仿你的图片)
              report.push("====================");
              report.push("Bug: " + prestige); 
              report.push("====================");

            } catch (err) {
              report.push("⚠️ 运行异常: " + err.message);
            }
            return report.join('\n');
          }

          async function main() {
            if (cookies.length === 0) return console.log("未配置 Secret");
            for (let i = 0; i < cookies.length; i++) {
              const res = await executeTask(cookies[i], i);
              finalReport.push("\n" + res);
            }
            const message = finalReport.join('\n');
            console.log(message);
            if (pushKey) {
              const url = "https://api.day.app/" + pushKey + "/" + encodeURIComponent("吾爱破解报告") + "/" + encodeURIComponent(message) + "?isArchive=1";
              await axios.get(url).catch(() => {});
            }
          }
          main();
          EOF
          
          node index.js
