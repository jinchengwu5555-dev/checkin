name: 52Pojie Visual Pro 2026

on:
  schedule:
    # 槟城时间 09:00
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  pojie_task:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Automation
        env:
          POJIE_COOKIES: ${{ secrets.POJIE_COOKIES }}
          PUSH_KEY: ${{ secrets.PUSH_KEY }}
        run: |
          npm install axios
          
          cat << 'EOF' > index.js
          const axios = require('axios');

          const cookies = process.env.POJIE_COOKIES ? process.env.POJIE_COOKIES.split('@') : [];
          const pushKey = process.env.PUSH_KEY;
          let finalReport = ["🔹 吾爱破解自动化看板"];

          async function executeTask(cookie, index) {
            // 强化 Cookie 处理逻辑
            const cleanCookie = cookie.split('只找到')[0].trim();
            
            const api = axios.create({
              timeout: 30000,
              headers: {
                'Cookie': cleanCookie,
                // 模拟最常见的 Windows Chrome 浏览器，降低异地拦截率
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36',
                'Referer': 'https://www.52pojie.cn/forum.php',
                'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8',
                'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8'
              }
            });

            let report = [];
            try {
              // 1. 访问积分页面（这是 Discuz 鉴权最严的地方）
              const res = await api.get('https://www.52pojie.cn/home.php?mod=spacecp&ac=credit&showuser=1');
              const html = res.data;

              // 检测是否被 52 破解的防火墙拦截
              if (html.includes('安全验证') || html.includes('Cloudflare')) {
                report.push("❌ 拦截警报: GitHub 美国机房 IP 被封锁，请几小时后再测试");
                return report.join('\n');
              }

              // 识别用户名 (支持 htVC_2132_ 这种前缀驱动的页面)
              const nameMatch = html.match(/vwmy\"><a[^>]*>(.+?)<\/a>/) || html.match(/class=\"vwmy\">(.+?)<\/a>/);
              const userName = nameMatch ? nameMatch[1] : "未知会员";
              report.push("掘友: " + userName);

              if (userName === "未知会员") {
                 // 自动诊断：如果 Cookie 里缺少关键字段
                 if (!cleanCookie.includes('auth')) {
                   report.push("❌ 状态: Cookie 格式错误，缺少 auth 字段");
                 } else {
                   report.push("❌ 状态: 身份校验失败。请在无痕模式登录并抓取 document.cookie");
                 }
                 return report.join('\n');
              }

              // 2. 执行签到任务
              const checkIn = await api.get('https://www.52pojie.cn/home.php?mod=task&do=apply&id=2');
              if (checkIn.data.includes('任务已成功完成') || checkIn.data.includes('已经完成')) {
                report.push("✅ 任务状态: 签到任务已达成");
              } else {
                report.push("ℹ️ 签到状态: 手动模式或任务处于维护期");
              }

              // 3. 统计资产 (对齐图片样式)
              const coin = (html.match(/吾爱币: <\/em>(.+?)&nbsp;/) || [])[1] || "0";
              const credit = (html.match(/积分: <\/em>(.+?)&nbsp;/) || [])[1] || "0";
              const prestige = (html.match(/威望: <\/em>(.+?) <\/li>/) || [])[1] || "0";
              const contribution = (html.match(/贡献: <\/em>(.+?) <\/li>/) || [])[1] || "0";

              report.push("累计积分: " + credit);
              report.push("当前吾爱币: " + coin);
              report.push("当前幸运值: " + prestige + "/1000");
              report.push("====================");
              report.push("Bug: " + contribution); // 按照你的 Juejin 图片逻辑，将贡献映射为 Bug
              report.push("====================");

            } catch (err) {
              report.push("⚠️ 运行异常: " + (err.response ? "HTTP " + err.response.status : "连接超时"));
            }
            return report.join('\n');
          }

          async function main() {
            if (cookies.length === 0) return console.log("未检测到 Secret 配置");
            for (let i = 0; i < cookies.length; i++) {
              const res = await executeTask(cookies[i], i);
              finalReport.push("\n" + res);
            }
            const message = finalReport.join('\n');
            console.log(message);
            if (pushKey) {
              const url = "https://api.day.app/" + pushKey + "/" + encodeURIComponent("52看板报告") + "/" + encodeURIComponent(message) + "?isArchive=1";
              await axios.get(url).catch(() => {});
            }
          }
          main();
          EOF
          
          node index.js
