name: 52Pojie Mobile Pro 2026

on:
  schedule:
    # 槟城时间 09:00
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  pojie_task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Automation
        env:
          POJIE_COOKIES: ${{ secrets.POJIE_COOKIES }}
          PUSH_KEY: ${{ secrets.PUSH_KEY }}
        run: |
          npm install axios
          
          cat << 'EOF' > index.js
          const axios = require('axios');

          const cookies = process.env.POJIE_COOKIES ? process.env.POJIE_COOKIES.split('@') : [];
          const pushKey = process.env.PUSH_KEY;
          let finalReport = ["📱 吾爱破解资产看板 (移动版)"];

          async function executeTask(cookie, index) {
            // 剔除杂质
            const cleanCookie = cookie.split('只找到')[0].trim();
            
            const api = axios.create({
              timeout: 25000,
              headers: {
                'Cookie': cleanCookie,
                'User-Agent': 'Mozilla/5.0 (iPhone; CPU iPhone OS 17_4 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.4 Mobile/15E148 Safari/604.1',
                'Referer': 'https://www.52pojie.cn/forum.php?mobile=yes',
                'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8'
              }
            });

            let report = [];
            try {
              // 第一步：访问移动端首页看登录态
              const home = await api.get('https://www.52pojie.cn/forum.php?mobile=yes');
              const html = home.data;

              // 检测 WAF
              if (html.includes('安全验证') || html.includes('Cloudflare')) {
                report.push("❌ 拦截警报: 移动端依然被 WAF 封锁");
                return report.join('\n');
              }

              // 移动端匹配用户名
              const nameMatch = html.match(/<a[^>]*>(.+?)<\/a>欢迎您/) || html.match(/欢迎您, (.+?)<\/div>/);
              const userName = nameMatch ? nameMatch[1] : "未知会员";
              report.push("掘友: " + userName);

              if (userName === "未知会员") {
                 report.push("❌ 状态: Cookie 失效，请重新按 F12 抓取最新的 ht_auth 字段");
                 return report.join('\n');
              }

              // 第二步：执行签到 (移动端专用任务链接)
              const checkIn = await api.get('https://www.52pojie.cn/home.php?mod=task&do=apply&id=2');
              if (checkIn.data.includes('任务已成功完成')) {
                report.push("✅ 签到成功: 奖励已存入包裹");
              } else {
                report.push("ℹ️ 签到状态: 今日已完成或任务冷却中");
              }

              // 第三步：抓取资产数据 (对齐你的图片样式)
              const creditRes = await api.get('https://www.52pojie.cn/home.php?mod=spacecp&ac=credit&showuser=1');
              const creditHtml = creditRes.data;
              const coin = (creditHtml.match(/吾爱币: <\/em>(.+?)&nbsp;/) || [])[1] || "0";
              const prestige = (creditHtml.match(/威望: <\/em>(.+?) <\/li>/) || [])[1] || "0";

              report.push("当前吾爱币: " + coin);
              report.push("当前威望值: " + prestige);
              report.push("====================");
              report.push("Bug: " + prestige); 
              report.push("====================");

            } catch (err) {
              report.push("⚠️ 通讯异常: " + (err.response ? "HTTP " + err.response.status : "超时"));
            }
            return report.join('\n');
          }

          async function main() {
            if (cookies.length === 0) return console.log("未配置 Secret");
            for (let i = 0; i < cookies.length; i++) {
              console.log("执行移动端账号 " + (i + 1));
              const res = await executeTask(cookies[i], i);
              finalReport.push("\n" + res);
            }
            const message = finalReport.join('\n');
            console.log(message);
            if (pushKey) {
              const barkUrl = "https://api.day.app/" + pushKey + "/" + encodeURIComponent("52移动报告") + "/" + encodeURIComponent(message) + "?isArchive=1";
              await axios.get(barkUrl).catch(() => {});
            }
          }
          main();
          EOF
          
          node index.js
