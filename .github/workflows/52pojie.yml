name: 52Pojie Helper Pro 2026

on:
  schedule:
    # 每天北京/槟城时间 09:00 (UTC 01:00)
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  pojie_task:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Automation
        env:
          # 粘贴你抓到的那一长串，记得删掉末尾的中文说明
          POJIE_COOKIES: ${{ secrets.POJIE_COOKIES }}
          PUSH_KEY: ${{ secrets.PUSH_KEY }}
        run: |
          npm install axios
          
          cat << 'EOF' > index.js
          const axios = require('axios');

          const cookies = process.env.POJIE_COOKIES ? process.env.POJIE_COOKIES.split('@') : [];
          const pushKey = process.env.PUSH_KEY;
          let finalReport = ["🏴‍☠️ 吾爱破解资产报告"];

          async function executeTask(cookie, index) {
            const api = axios.create({
              timeout: 20000,
              headers: {
                'Cookie': cookie.trim(),
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
                'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,apple-touch-icon-next,image/apng,*/*;q=0.8',
                'Referer': 'https://www.52pojie.cn/forum.php',
                'Host': 'www.52pojie.cn',
                'Upgrade-Insecure-Requests': '1',
                'Sec-Fetch-Dest': 'document',
                'Sec-Fetch-Mode': 'navigate',
                'Sec-Fetch-Site': 'none',
                'Sec-Fetch-User': '?1'
              }
            });

            let report = [];
            try {
              // 1. 尝试进入个人中心，这是检测登录态最准的地方
              const homeRes = await api.get('https://www.52pojie.cn/home.php?mod=spacecp&ac=credit&showuser=1');
              const html = homeRes.data;

              // 检测 WAF
              if (html.includes('安全验证') || html.includes('Cloudflare')) {
                report.push("❌ 访问拦截: 触发了 52 验证码，请在手机端登录一次");
                return report.join('\n');
              }

              // 动态匹配用户名 (Discuz 各种版本通配)
              const userNameMatch = html.match(/vwmy\"><a[^>]*>(.+?)<\/a>/) || html.match(/class=\"vwmy\">(.+?)<\/a>/);
              const userName = userNameMatch ? userNameMatch[1] : "未知会员";
              report.push("掘友: " + userName);

              if (userName === "未知会员") {
                report.push("❌ 认证失败: Cookie 格式不正确或 Session 已过期");
                return report.join('\n');
              }

              // 2. 执行签到 (获取奖励)
              const checkInRes = await api.get('https://www.52pojie.cn/home.php?mod=task&do=apply&id=2');
              const checkMsg = checkInRes.data;

              if (checkMsg.includes("任务已成功完成")) {
                report.push("✅ 签到成功: 经验 +1 / 吾爱币 +1");
              } else if (checkMsg.includes("已经完成") || checkMsg.includes("不是进行中的任务")) {
                report.push("ℹ️ 签到状态: 今日已完成签到");
              } else {
                report.push("⚠️ 签到异常: 任务状态不符");
              }

              // 3. 统计资产 (正则表达式增强版)
              const coin = (html.match(/吾爱币: <\/em>(.+?)&nbsp;/) || [])[1] || "0";
              const credit = (html.match(/积分: <\/em>(.+?)&nbsp;/) || [])[1] || "0";
              const prestige = (html.match(/威望: <\/em>(.+?) <\/li>/) || [])[1] || "0";

              report.push("当前吾爱币: " + coin);
              report.push("当前总积分: " + credit);
              report.push("当前威望值: " + prestige);
              report.push("====================");
              report.push("Bug: " + prestige); // 幽默复刻掘金 Bug 统计
              report.push("====================");

            } catch (err) {
              report.push("⚠️ 网络异常: " + (err.response ? "HTTP " + err.response.status : err.message));
            }
            return report.join('\n');
          }

          async function main() {
            if (cookies.length === 0) return console.log("未配置 Secret");
            for (let i = 0; i < cookies.length; i++) {
              console.log("正在处理账号 " + (i + 1));
              const res = await executeTask(cookies[i], i);
              finalReport.push("\n" + res);
            }
            const message = finalReport.join('\n');
            console.log(message);
            if (pushKey) {
              const barkUrl = "https://api.day.app/" + pushKey + "/" + encodeURIComponent("吾爱破解报告") + "/" + encodeURIComponent(message) + "?isArchive=1";
              await axios.get(barkUrl).catch(() => {});
            }
          }
          main();
          EOF
          
          node index.js
