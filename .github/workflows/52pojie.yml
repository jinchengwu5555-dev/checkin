name: 52Pojie Helper 2026

on:
  schedule:
    # 槟城时间 09:00 (UTC 01:00) 
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  pojie_task:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Automation
        env:
          # 格式: 完整的 Cookie 字符串，多账号用 @ 分隔
          POJIE_COOKIES: ${{ secrets.POJIE_COOKIES }}
          PUSH_KEY: ${{ secrets.PUSH_KEY }}
        run: |
          npm install axios
          
          cat << 'EOF' > index.js
          const axios = require('axios');

          const cookies = process.env.POJIE_COOKIES ? process.env.POJIE_COOKIES.split('@') : [];
          const pushKey = process.env.PUSH_KEY;
          let finalReport = ["🏴‍☠️ 吾爱破解自动化报告"];

          async function executeTask(cookie, index) {
            const api = axios.create({
              timeout: 20000,
              headers: {
                'Cookie': cookie,
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
                'Referer': 'https://www.52pojie.cn/index.php',
                'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,apple-touch-icon-next,image/apng,*/*;q=0.8'
              }
            });

            let report = [];
            try {
              // 1. 获取用户信息与资产 (模拟图片样式)
              const homeRes = await api.get('https://www.52pojie.cn/home.php?mod=spacecp&ac=credit&showuser=1');
              const html = homeRes.data;
              
              const userNameMatch = html.match(/class=\"vwmy\">(.+?)<\/a>/);
              const userName = userNameMatch ? userNameMatch[1] : "未知会员";
              report.push("掘友: " + userName);

              // 2. 执行签到
              // 52Pojie 签到逻辑：访问申请任务链接即可
              const checkInRes = await api.get('https://www.52pojie.cn/home.php?mod=task&do=apply&id=2');
              const statusMsg = checkInRes.data;

              if (statusMsg.includes("任务已成功完成")) {
                report.push("✅ 签到成功: 经验 +1 / 吾爱币 +1");
              } else if (statusMsg.includes("不是进行中的任务") || statusMsg.includes("您已经完成过此任务")) {
                report.push("ℹ️ 签到状态: 今日已完成签到");
              } else if (statusMsg.includes("抱歉，您尚未登录")) {
                report.push("❌ 状态: Cookie 已失效");
              } else {
                report.push("⚠️ 签到反馈: 任务处于维护中或需手动验证");
              }

              // 3. 获取详细资产数值 (正则表达式匹配)
              const coinMatch = html.match(/吾爱币: <\/em>(.+?)&nbsp;/);
              const expMatch = html.match(/积分: <\/em>(.+?)&nbsp;/);
              const prestigeMatch = html.match(/威望: <\/em>(.+?) <\/li>/);

              if (coinMatch) report.push("当前吾爱币: " + coinMatch[1]);
              if (expMatch) report.push("当前总积分: " + expMatch[1]);
              if (prestigeMatch) report.push("当前威望值: " + prestigeMatch[1]);

              report.push("====================");

            } catch (err) {
              report.push("⚠️ 运行异常: " + (err.response ? "HTTP " + err.response.status : "网络连接超时"));
            }
            return report.join('\n');
          }

          async function main() {
            if (cookies.length === 0) return console.log("未配置 POJIE_COOKIES");
            for (let i = 0; i < cookies.length; i++) {
              console.log("正在执行账号 " + (i + 1));
              const res = await executeTask(cookies[i], i);
              finalReport.push("\n" + res);
            }
            const message = finalReport.join('\n');
            console.log(message);
            if (pushKey) {
              const url = "https://api.day.app/" + pushKey + "/" + encodeURIComponent("吾爱破解报告") + "/" + encodeURIComponent(message) + "?isArchive=1";
              await axios.get(url).catch(() => {});
            }
          }
          main();
          EOF
          
          node index.js
