name: 52Pojie Final Dashboard

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  pojie_task:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Automation
        env:
          POJIE_COOKIES: ${{ secrets.POJIE_COOKIES }}
          PUSH_KEY: ${{ secrets.PUSH_KEY }}
        run: |
          npm install axios
          
          cat << 'EOF' > index.js
          const axios = require('axios');

          const cookies = process.env.POJIE_COOKIES ? process.env.POJIE_COOKIES.split('@') : [];
          const pushKey = process.env.PUSH_KEY;
          let finalReport = ["🔹 吾爱破解自动化中心报告"];

          async function executeTask(cookie, index) {
            // 自动清理 Cookie 中的说明文字
            const cleanCookie = cookie.split('只找到')[0].split('cookies')[0].trim();
            
            const api = axios.create({
              timeout: 30000,
              headers: {
                'Cookie': cleanCookie,
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
                'Referer': 'https://www.52pojie.cn/',
                'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8'
              }
            });

            let report = [];
            try {
              // 直接冲击任务页面 (绕过首页复杂的 IP 审计)
              const taskPage = await api.get('https://www.52pojie.cn/home.php?mod=task&item=done');
              const html = taskPage.data;

              // 识别用户名
              const nameMatch = html.match(/vwmy\"><a[^>]*>(.+?)<\/a>/) || html.match(/欢迎您, (.+?)<\/div>/);
              const userName = nameMatch ? nameMatch[1] : "未知会员";
              report.push("掘友: " + userName);

              if (userName === "未知会员") {
                 report.push("❌ 认证失败: 52 拦截了异地登录，请按下方说明重新抓取");
                 return report.join('\n');
              }

              // 执行签到
              const checkIn = await api.get('https://www.52pojie.cn/home.php?mod=task&do=apply&id=2');
              if (checkIn.data.includes('任务已成功完成') || checkIn.data.includes('已经完成')) {
                report.push("✅ 签到状态: 任务已达成");
              } else {
                report.push("ℹ️ 签到状态: 已签到或处于冷却期");
              }

              // 资产看板 (对齐掘金图片样式)
              const creditRes = await api.get('https://www.52pojie.cn/home.php?mod=spacecp&ac=credit&showuser=1');
              const cHtml = creditRes.data;
              const coin = (cHtml.match(/吾爱币: <\/em>(.+?)&nbsp;/) || [])[1] || "0";
              const prestige = (cHtml.match(/威望: <\/em>(.+?) <\/li>/) || [])[1] || "0";
              const contribution = (cHtml.match(/贡献: <\/em>(.+?) <\/li>/) || [])[1] || "0";

              report.push("当前吾爱币: " + coin);
              report.push("当前幸运值: " + prestige + "/6000");
              report.push("====================");
              report.push("Bug: " + contribution); // 将贡献映射为 Bug 数
              report.push("====================");

            } catch (err) {
              report.push("⚠️ 通讯异常: " + (err.response ? "HTTP " + err.response.status : "机房网络波动"));
            }
            return report.join('\n');
          }

          async function main() {
            if (cookies.length === 0) return console.log("未配置 Secret");
            for (let i = 0; i < cookies.length; i++) {
              const res = await executeTask(cookies[i], i);
              finalReport.push("\n" + res + "\n--------------------");
            }
            const message = finalReport.join('\n');
            console.log(message);
            if (pushKey) {
              const url = "https://api.day.app/" + pushKey + "/" + encodeURIComponent("52看板") + "/" + encodeURIComponent(message) + "?isArchive=1";
              await axios.get(url).catch(() => {});
            }
          }
          main();
          EOF
          
          node index.js
