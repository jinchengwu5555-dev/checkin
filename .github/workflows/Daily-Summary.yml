name: Daily Summary
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 5'  # 每周五 UTC 00:00，即北京时间 08:00

jobs:
  # delay:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Random Delay
  #       run: |
  #         delay=$((RANDOM % 1800))
  #         echo "随机等待 ${delay} 秒（约 $((delay/60)) 分钟）"
  #         sleep $delay

  epic:
    # needs: delay
    uses: ./.github/workflows/epic-games.yml
  steam:
    # needs: delay
    uses: ./.github/workflows/steam-sales.yml

  push:
    needs: [epic, steam]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Push to Server酱
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          RESULT_EPIC:     ${{ needs.epic.outputs.result }}
          RESULT_STEAM:    ${{ needs.steam.outputs.result }}
        run: |
          python3 - << 'EOF'
          import os, requests
          from datetime import datetime, timezone, timedelta

          key = os.environ.get('SERVERCHAN_KEY', '')
          if not key:
              print("未设置 SERVERCHAN_KEY，跳过推送")
              exit(0)

          cst = timezone(timedelta(hours=8))
          now = datetime.now(cst).strftime("%Y-%m-%d %H:%M")
          title = f"📋 每周报告 {now}"

          def get(k, fallback):
              v = os.environ.get(k, '').strip()
              return v if v else fallback

          sections = [
              get('RESULT_EPIC',     '🎮 Epic: 未运行'),
              get('RESULT_STEAM',    '🎮 Steam: 未运行'),
          ]

          desp = '\n\n---\n\n'.join(sections)
          r = requests.post(
              f"https://sctapi.ftqq.com/{key}.send",
              data={'title': title, 'desp': desp},
              timeout=10
          )
          print("Server酱推送结果:", r.json())
          EOF
