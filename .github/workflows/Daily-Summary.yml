name: Daily Summary
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  delay:
    runs-on: ubuntu-latest
    steps:
      - name: Random Delay (北京时间 08:00~09:00)
        run: |
          delay=$((RANDOM % 1))
          echo "随机等待 ${delay} 秒（约 $((delay/60)) 分钟）"
          sleep $delay

  bilibili:
    needs: delay
    uses: ./.github/workflows/bilibili-checkin.yml
    secrets: inherit
  juejin:
    needs: delay
    uses: ./.github/workflows/juejin-checkin.yml
    secrets: inherit
  baidu:
    needs: delay
    uses: ./.github/workflows/baidu-checkin.yml
    secrets: inherit
  jd:
    needs: delay
    uses: ./.github/workflows/jd-checkin.yml
    secrets: inherit
  epic:
    needs: delay
    uses: ./.github/workflows/epic-games.yml
  steam:
    needs: delay
    uses: ./.github/workflows/steam-sales.yml
  etf:
    needs: delay
    uses: ./.github/workflows/etf-stock.yml
  exchange:
    needs: delay
    uses: ./.github/workflows/exchange-rates.yml
  nba:
    needs: delay
    uses: ./.github/workflows/nba-schedule.yml

  push:
    needs: [bilibili, juejin, baidu, jd, epic, steam, etf, exchange, nba]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Push to Server酱
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          # ── 把每个 output 存为独立环境变量，避免多行内容直接展开到 Python 字符串 ──
          RESULT_BILIBILI:  ${{ needs.bilibili.outputs.result }}
          RESULT_JUEJIN:    ${{ needs.juejin.outputs.result }}
          RESULT_BAIDU:     ${{ needs.baidu.outputs.result }}
          RESULT_JD:        ${{ needs.jd.outputs.result }}
          RESULT_EPIC:      ${{ needs.epic.outputs.result }}
          RESULT_STEAM:     ${{ needs.steam.outputs.result }}
          RESULT_ETF:       ${{ needs.etf.outputs.result }}
          RESULT_EXCHANGE:  ${{ needs.exchange.outputs.result }}
          RESULT_NBA:       ${{ needs.nba.outputs.result }}
        run: |
          python3 - << 'EOF'
          import os, requests
          from datetime import datetime, timezone, timedelta

          key = os.environ.get('SERVERCHAN_KEY', '')
          if not key:
              print("未设置 SERVERCHAN_KEY，跳过推送")
              exit(0)

          cst = timezone(timedelta(hours=8))
          now = datetime.now(cst).strftime("%Y-%m-%d %H:%M")
          title = f"📋 每日报告 {now}"

          # 从环境变量读取，缺失时显示"未运行"
          def get(key, fallback):
              v = os.environ.get(key, '').strip()
              return v if v else fallback

          sections = [
              get('RESULT_BILIBILI', '📺 Bilibili: 未运行'),
              get('RESULT_JUEJIN',   '🪙 掘金: 未运行'),
              get('RESULT_BAIDU',    '☁️ 百度网盘: 未运行'),
              get('RESULT_JD',       '🛒 京东: 未运行'),
              get('RESULT_EPIC',     '🎮 Epic: 未运行'),
              get('RESULT_STEAM',    '🎮 Steam: 未运行'),
              get('RESULT_ETF',      '📊 ETF行情: 未运行'),
              get('RESULT_EXCHANGE', '💱 汇率: 未运行'),
              get('RESULT_NBA',      '🏀 NBA: 未运行'),
          ]

          desp = '\n\n---\n\n'.join(sections)
          r = requests.post(
              f"https://sctapi.ftqq.com/{key}.send",
              data={'title': title, 'desp': desp},
              timeout=10
          )
          print("Server酱推送结果:", r.json())
          EOF
