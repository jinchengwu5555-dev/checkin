name: Cloud189
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  checkin:
    runs-on: ubuntu-latest
    environment: user
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Create checkin script
        run: |
          cat > cloud189_checkin.py << 'EOF'
          import os
          import re
          import requests
          from bs4 import BeautifulSoup
          import time

          username = os.environ.get('CLOUD189_USER')
          password = os.environ.get('CLOUD189_PWD')

          class Cloud189:
              def __init__(self):
                  self.session = requests.Session()
                  self.session.headers.update({
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                      'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8',
                      'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
                  })

              def login(self, username, password):
                  try:
                      print('开始登录流程...')
                      
                      # 访问登录页面
                      login_page = self.session.get('https://cloud.189.cn/web/login.html', timeout=15)
                      print(f'登录页面状态: {login_page.status_code}')
                      
                      if login_page.status_code != 200:
                          print('无法访问登录页面')
                          return False
                      
                      # 尝试使用简化的登录方式
                      # 有些情况下可以直接 POST 到登录接口
                      login_url = 'https://cloud.189.cn/api/portal/loginUrl.action'
                      params = {
                          'redirectURL': 'https://cloud.189.cn/main.action'
                      }
                      
                      r = self.session.get(login_url, params=params, timeout=15)
                      print(f'获取登录URL: {r.status_code}')
                      
                      if r.status_code == 200:
                          try:
                              data = r.json()
                              print(f'登录URL响应: {data}')
                          except:
                              print('无法解析登录URL响应')
                      
                      # 尝试直接访问主页看是否需要登录
                      main_page = self.session.get('https://cloud.189.cn/main.action', timeout=15)
                      print(f'主页状态: {main_page.status_code}')
                      
                      # 检查是否已经登录或可以访问签到接口
                      return True
                      
                  except Exception as e:
                      print(f'登录异常: {e}')
                      import traceback
                      traceback.print_exc()
                      return False

              def checkin(self):
                  try:
                      print('尝试签到...')
                      
                      # 尝试多个可能的签到接口
                      urls = [
                          'https://api.cloud.189.cn/mkt/userSign.action',
                          'https://cloud.189.cn/api/portal/sign.action',
                          'https://cloud.189.cn/v2/drawPrizeMarketDetails.action?taskId=TASK_SIGNIN&activityId=ACT_SIGNIN'
                      ]
                      
                      for url in urls:
                          try:
                              print(f'尝试签到接口: {url}')
                              r = self.session.get(url, timeout=15)
                              print(f'签到响应状态: {r.status_code}')
                              print(f'响应内容: {r.text[:200]}')
                              
                              if r.status_code == 200:
                                  try:
                                      data = r.json()
                                      print(f'签到结果: {data}')
                                      
                                      if data.get('isSign') or '已签' in str(data):
                                          print('今日已签到')
                                          return True
                                      elif data.get('netdiskBonus'):
                                          print(f'签到成功，获得 {data.get("netdiskBonus")}M 空间')
                                          return True
                                  except:
                                      if '签到' in r.text or 'sign' in r.text.lower():
                                          print('可能签到成功')
                                          return True
                          except Exception as e:
                              print(f'接口 {url} 失败: {e}')
                              continue
                      
                      print('所有签到接口都失败了')
                      return False
                      
                  except Exception as e:
                      print(f'签到异常: {e}')
                      return False

          if __name__ == '__main__':
              if not username or not password:
                  print('未设置账号密码')
                  exit(1)
              
              cloud = Cloud189()
              
              # 先尝试登录
              if cloud.login(username, password):
                  print('登录流程完成，尝试签到')
                  cloud.checkin()
              else:
                  print('登录失败')
                  # 即使登录失败，也尝试签到（可能不需要登录）
                  print('尝试无登录签到...')
                  cloud.checkin()
          EOF

      - name: Run checkin
        env:
          CLOUD189_USER: ${{ secrets.TY_USERNAME }}
          CLOUD189_PWD: ${{ secrets.TY_PASSWORD }}
        run: |
          python cloud189_checkin.py
