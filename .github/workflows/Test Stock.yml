name: Test Stock

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance --break-system-packages

      - name: Fetch Stock Data
        run: |
          python3 - << 'EOF'
          import requests, yfinance as yf
          from datetime import datetime, timezone, timedelta

          ETFS = [
              ('510500', 'дЄ≠иѓБ500ETF',  '510500.SS'),
              ('518880', 'йїДйЗСETF',     '518880.SS'),
              ('510300', 'ж≤™жЈ±300ETF',  '510300.SS'),
              ('513100', 'зЇ≥жЦѓиЊЊеЕЛETF', '513100.SS'),
              ('513500', 'ж†ЗжЩЃ500ETF',  '513500.SS'),
          ]

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Referer': 'https://finance.sina.com.cn'
          }

          def get_realtime(code):
              try:
                  r = requests.get(f"https://hq.sinajs.cn/list=sh{code}", headers=headers, timeout=10)
                  r.encoding = 'gbk'
                  data_str = r.text.split('"')[1]
                  if not data_str:
                      return None
                  f = data_str.split(',')
                  prev_close = float(f[2])
                  current    = float(f[3])
                  return {
                      'current':    current,
                      'change_pct': (current - prev_close) / prev_close * 100,
                  }
              except:
                  return None

          def get_history_high(yahoo_symbol):
              try:
                  hist = yf.Ticker(yahoo_symbol).history(period='max')
                  if hist.empty:
                      return None
                  return hist['High'].max()
              except:
                  return None

          def dw(s):
              return sum(2 if ord(c) > 127 else 1 for c in str(s))

          def pad(s, width):
              s = str(s)
              pad_total = width - dw(s)
              l = pad_total // 2
              return ' ' * l + s + ' ' * (pad_total - l)

          cols = [
              ('ETFеРНзІ∞',    12),
              ('зО∞дїЈ',        8),
              ('иЊГеЙНжЧ•',     10),
              ('еОЖеП≤жЬАйЂШ',   10),
              ('зО∞дїЈ/жЬАйЂШ',  10),
          ]

          def sep(l, m, r):
              return l + m.join('вФА' * w for _, w in cols) + r

          def row(cells):
              return 'вФВ' + 'вФВ'.join(pad(c, w) for c, (_, w) in zip(cells, cols)) + 'вФВ'

          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M')

          print(f'рЯУК ETF и°МжГЕ  {now}')
          print(sep('вФМ', 'вФђ', 'вФР'))
          print(row([n for n, _ in cols]))
          print(sep('вФЬ', 'вФЉ', 'вФ§'))

          for code, label, yahoo in ETFS:
              d    = get_realtime(code)
              high = get_history_high(yahoo)

              if d:
                  arrow = 'вЖС' if d['change_pct'] >= 0 else 'вЖУ'
                  sign  = '+' if d['change_pct'] >= 0 else ''
                  cur   = f"{d['current']:.3f}"
                  pct   = f"{arrow}{sign}{d['change_pct']:.2f}%"
                  h_str = f"{high:.3f}" if high else 'N/A'
                  ratio = f"{d['current']/high*100:.1f}%" if high else 'N/A'
                  print(row([label, cur, pct, h_str, ratio]))
              else:
                  print(row([label, 'N/A', 'N/A', 'N/A', 'N/A']))

          print(sep('вФФ', 'вФі', 'вФШ'))
          EOF
```

