name: Test Stock

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Fetch Stock Data
        run: |
          python3 - << 'EOF'
          import requests

          ETFS = [
              ('510500', '中证500ETF'),
              ('518880', '黄金ETF'),
              ('510300', '沪深300ETF'),
              ('513100', '纳斯达克ETF'),
              ('513500', '标普500ETF'),
          ]

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Referer': 'https://finance.sina.com.cn'
          }

          def get_realtime(code):
              url = f"https://hq.sinajs.cn/list=sh{code}"
              try:
                  r = requests.get(url, headers=headers, timeout=10)
                  r.encoding = 'gbk'
                  data_str = r.text.split('"')[1]
                  if not data_str:
                      return None
                  f = data_str.split(',')
                  prev_close = float(f[2])
                  current    = float(f[3])
                  return {
                      'name':       f[0],
                      'current':    current,
                      'prev_close': prev_close,
                      'change_pct': (current - prev_close) / prev_close * 100,
                  }
              except Exception as e:
                  print(f"实时数据失败 {code}: {e}")
                  return None

          def get_history_high(code):
              """通过新浪财经历史接口获取历史最高价"""
              url = f"https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData"
              params = {
                  'symbol':    f"sh{code}",
                  'scale':     240,    # 日K
                  'ma':        'no',
                  'datalen':   3000,   # 最多取3000条
              }
              try:
                  r = requests.get(url, params=params, headers=headers, timeout=15)
                  r.encoding = 'utf-8'
                  import json, re
                  # 响应格式: [{"d":"2024-01-01","o":"1.1","h":"1.2","l":"1.0","c":"1.1","v":"1000"}]
                  data = json.loads(r.text)
                  if not data:
                      return None
                  highs = [float(item['h']) for item in data if 'h' in item]
                  return max(highs) if highs else None
              except Exception as e:
                  print(f"历史最高失败 {code}: {e}")
                  return None

          def display_width(s):
              """计算字符串实际显示宽度（中文=2，英文=1）"""
              w = 0
              for c in str(s):
                  w += 2 if ord(c) > 127 else 1
              return w

          def pad_cell(s, width):
              """按显示宽度居中填充"""
              s = str(s)
              dw = display_width(s)
              total_pad = width - dw
              left  = total_pad // 2
              right = total_pad - left
              return ' ' * left + s + ' ' * right

          # 列宽（按显示宽度定义）
          cols = [
              ('名称',       12),
              ('现价',        8),
              ('涨跌幅',     10),
              ('历史最高',   10),
              ('现价/最高',  10),
          ]

          def make_sep(left, mid, right, fill='─'):
              return left + mid.join(fill * w for _, w in cols) + right

          def make_row(cells):
              return '│' + '│'.join(pad_cell(c, w) for c, (_, w) in zip(cells, cols)) + '│'

          print(make_sep('┌', '┬', '┐'))
          print(make_row([name for name, _ in cols]))
          print(make_sep('├', '┼', '┤'))

          results = []
          for code, label in ETFS:
              d    = get_realtime(code)
              high = get_history_high(code)

              if d:
                  sign  = '+' if d['change_pct'] >= 0 else ''
                  arrow = '↑' if d['change_pct'] >= 0 else '↓'
                  pct   = f"{arrow}{sign}{d['change_pct']:.2f}%"
                  cur   = f"{d['current']:.3f}"
                  h_str = f"{high:.3f}" if high else 'N/A'
                  ratio = f"{d['current']/high*100:.1f}%" if high else 'N/A'
                  row   = [label, cur, pct, h_str, ratio]
              else:
                  row = [label, 'N/A', 'N/A', 'N/A', 'N/A']

              results.append(row)
              print(make_row(row))

          print(make_sep('└', '┴', '┘'))
          EOF
