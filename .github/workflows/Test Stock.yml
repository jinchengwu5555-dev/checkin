name: Test Stock

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Fetch Stock Data
        run: |
          python3 - << 'EOF'
          import requests

          ETFS = [
              ('510500', '中证500ETF',  '1'),
              ('518880', '黄金ETF',     '1'),
              ('510300', '沪深300ETF',  '1'),
              ('513100', '纳斯达克ETF', '1'),
              ('513500', '标普500ETF',  '1'),
          ]

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Referer': 'https://finance.sina.com.cn'
          }

          def get_realtime(code):
              url = f"https://hq.sinajs.cn/list=sh{code}"
              try:
                  r = requests.get(url, headers=headers, timeout=10)
                  r.encoding = 'gbk'
                  data_str = r.text.split('"')[1]
                  if not data_str:
                      return None
                  f = data_str.split(',')
                  prev_close = float(f[2])
                  current    = float(f[3])
                  return {
                      'name':       f[0],
                      'current':    current,
                      'prev_close': prev_close,
                      'change_pct': (current - prev_close) / prev_close * 100,
                  }
              except Exception as e:
                  print(f"实时数据失败 {code}: {e}")
                  return None

          def get_history_high(code, prefix):
              url = "https://push2his.eastmoney.com/api/qt/stock/kline/get"
              params = {
                  'secid':   f"{prefix}.{code}",
                  'fields1': 'f1,f2,f3,f4,f5',
                  'fields2': 'f2,f3,f4,f5',
                  'klt':     '101',
                  'fqt':     '0',
                  'beg':     '19900101',
                  'end':     '20991231',
                  'lmt':     '10000',
              }
              try:
                  r = requests.get(url, params=params, headers=headers, timeout=15)
                  klines = r.json().get('data', {}).get('klines', [])
                  if not klines:
                      print(f"历史K线为空 {code}，尝试 secid 原始响应: {r.text[:200]}")
                      return None
                  # 格式: 日期,开,收,高,低,...
                  highs = [float(k.split(',')[3]) for k in klines]
                  return max(highs)
              except Exception as e:
                  print(f"历史最高失败 {code}: {e}")
                  return None

          # ── 表头 ──
          col = [14, 8, 10, 10, 12]
          def row(*cells):
              return '│' + '│'.join(
                  str(c).center(w) for c, w in zip(cells, col)
              ) + '│'

          sep = '├' + '┼'.join('─' * w for w in col) + '┤'
          top = '┌' + '┬'.join('─' * w for w in col) + '┐'
          bot = '└' + '┴'.join('─' * w for w in col) + '┘'

          print(top)
          print(row('名称', '现价', '涨跌幅', '历史最高', '现价/历史最高'))
          print(sep)

          for code, label, prefix in ETFS:
              d    = get_realtime(code)
              high = get_history_high(code, prefix)

              if d:
                  sign  = '+' if d['change_pct'] >= 0 else ''
                  arrow = '↑' if d['change_pct'] >= 0 else '↓'
                  pct   = f"{arrow}{sign}{d['change_pct']:.2f}%"
                  cur   = f"{d['current']:.3f}"
                  h_str = f"{high:.3f}" if high else 'N/A'
                  ratio = f"{d['current']/high*100:.1f}%" if high else 'N/A'
                  print(row(label, cur, pct, h_str, ratio))
              else:
                  print(row(label, 'N/A', 'N/A', 'N/A', 'N/A'))

          print(bot)
          EOF
