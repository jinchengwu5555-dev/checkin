name: Test Stock

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance --break-system-packages

      - name: Fetch Stock Data
        run: |
          python3 - << 'EOF'
          import requests, yfinance as yf

          ETFS = [
              ('510500', '中证500ETF',  '510500.SS'),
              ('518880', '黄金ETF',     '518880.SS'),
              ('510300', '沪深300ETF',  '510300.SS'),
              ('513100', '纳斯达克ETF', '513100.SS'),
              ('513500', '标普500ETF',  '513500.SS'),
          ]

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Referer': 'https://finance.sina.com.cn'
          }

          def get_realtime(code):
              url = f"https://hq.sinajs.cn/list=sh{code}"
              try:
                  r = requests.get(url, headers=headers, timeout=10)
                  r.encoding = 'gbk'
                  data_str = r.text.split('"')[1]
                  if not data_str:
                      return None
                  f = data_str.split(',')
                  prev_close = float(f[2])
                  current    = float(f[3])
                  return {
                      'name':       f[0],
                      'current':    current,
                      'prev_close': prev_close,
                      'change_pct': (current - prev_close) / prev_close * 100,
                  }
              except Exception as e:
                  print(f"实时数据失败 {code}: {e}")
                  return None

          def get_history_high(yahoo_symbol):
              """通过 Yahoo Finance 获取历史最高价"""
              try:
                  ticker = yf.Ticker(yahoo_symbol)
                  hist = ticker.history(period='max')
                  if hist.empty:
                      print(f"Yahoo 无数据: {yahoo_symbol}")
                      return None
                  high = hist['High'].max()
                  print(f"Yahoo {yahoo_symbol} 历史最高: {high:.3f}，共 {len(hist)} 条K线")
                  return high
              except Exception as e:
                  print(f"Yahoo 历史最高失败 {yahoo_symbol}: {e}")
                  return None

          def display_width(s):
              w = 0
              for c in str(s):
                  w += 2 if ord(c) > 127 else 1
              return w

          def pad_cell(s, width):
              s = str(s)
              dw = display_width(s)
              total_pad = width - dw
              left  = total_pad // 2
              right = total_pad - left
              return ' ' * left + s + ' ' * right

          cols = [
              ('名称',      12),
              ('现价',       8),
              ('涨跌幅',    10),
              ('历史最高',  10),
              ('现价/最高', 10),
          ]

          def make_sep(left, mid, right):
              return left + mid.join('─' * w for _, w in cols) + right

          def make_row(cells):
              return '│' + '│'.join(pad_cell(c, w) for c, (_, w) in zip(cells, cols)) + '│'

          print(make_sep('┌', '┬', '┐'))
          print(make_row([n for n, _ in cols]))
          print(make_sep('├', '┼', '┤'))

          for code, label, yahoo in ETFS:
              d    = get_realtime(code)
              high = get_history_high(yahoo)

              if d:
                  sign  = '+' if d['change_pct'] >= 0 else ''
                  arrow = '↑' if d['change_pct'] >= 0 else '↓'
                  pct   = f"{arrow}{sign}{d['change_pct']:.2f}%"
                  cur   = f"{d['current']:.3f}"
                  h_str = f"{high:.3f}" if high else 'N/A'
                  ratio = f"{d['current']/high*100:.1f}%" if high else 'N/A'
                  print(make_row([label, cur, pct, h_str, ratio]))
              else:
                  print(make_row([label, 'N/A', 'N/A', 'N/A', 'N/A']))

          print(make_sep('└', '┴', '┘'))
          EOF
