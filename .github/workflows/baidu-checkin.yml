name: Baidu Netdisk Checkin

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      result:
        description: "百度网盘签到"
        value: ${{ jobs.checkin.outputs.result }}

jobs:
  checkin:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.checkin.outputs.result }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests dailycheckin --break-system-packages

      - name: Baidu Checkin
        id: checkin
        env:
          BAIDUWP_COOKIE: ${{ secrets.BAIDUWP_COOKIE }}
        run: |
          python3 - << 'EOF'
          import os, json, subprocess, sys

          cookie = os.environ.get('BAIDUWP_COOKIE', '')
          if not cookie:
              result = "☁️ 百度网盘\n❌ 签到失败: 未设置 BAIDUWP_COOKIE"
              print(result)
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"result<<ENDBAIDU\n{result}\nENDBAIDU\n")
              sys.exit(0)

          try:
              with open('config.json', 'r') as f:
                  config = json.load(f)
              config['BAIDUWP'][0]['cookie'] = cookie
              with open('config.json', 'w') as f:
                  json.dump(config, f)
          except Exception:
              config = {"BAIDUWP": [{"cookie": cookie}]}
              with open('config.json', 'w') as f:
                  json.dump(config, f)

          proc = subprocess.run(['dailycheckin'], capture_output=True, text=True)
          output = proc.stdout + proc.stderr

          # 打印完整原始输出，方便调试
          print("=== 完整原始输出 ===")
          print(repr(output))
          print("=== 逐行输出 ===")
          for i, line in enumerate(output.splitlines()):
              print(f"[{i}] {line}")
          EOF
