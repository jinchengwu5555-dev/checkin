name: Baidu Netdisk Checkin

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      result:
        description: "百度网盘签到"
        value: ${{ jobs.checkin.outputs.result }}

jobs:
  checkin:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.checkin.outputs.result }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests dailycheckin --break-system-packages

      - name: Baidu Checkin
        id: checkin
        env:
          BAIDUWP_COOKIE: ${{ secrets.BAIDUWP_COOKIE }}
        run: |
          python3 - << 'EOF'
          import os, json, subprocess, sys

          cookie = os.environ.get('BAIDUWP_COOKIE', '')
          if not cookie:
              result = "☁️ 百度网盘\n❌ 未设置 BAIDUWP_COOKIE"
              print(result)
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"result<<ENDBAIDU\n{result}\nENDBAIDU\n")
              sys.exit(0)

          try:
              with open('config.json', 'r') as f:
                  config = json.load(f)
              config['BAIDUWP'][0]['cookie'] = cookie
              with open('config.json', 'w') as f:
                  json.dump(config, f)
          except Exception:
              config = {"BAIDUWP": [{"cookie": cookie}]}
              with open('config.json', 'w') as f:
                  json.dump(config, f)

          proc = subprocess.run(['dailycheckin'], capture_output=True, text=True)
          output = proc.stdout + proc.stderr

          # ✅✅✅✅✅ = 5项任务全部成功
          check_line = ''
          for line in output.splitlines():
              if '第 1 个账号' in line:
                  check_line = line.strip()
                  break

          success_count = check_line.count('✅') if check_line else 0
          fail_count    = check_line.count('❌') if check_line else 0

          if success_count > 0:
              status = f'✅ 签到成功（{success_count} 项任务完成）'
          elif fail_count > 0:
              status = f'⚠️ 部分失败（✅{success_count} ❌{fail_count}）'
          else:
              status = '❌ 签到失败'

          result = f'☁️ 百度网盘\n{status}'
          print(result)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"result<<ENDBAIDU\n{result}\nENDBAIDU\n")
          EOF
