name: Test NBA Push

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 --break-system-packages

      - name: Fetch NBA & Push
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: |
          python3 - << 'EOF'
          import requests, os, json
          from datetime import datetime, timezone, timedelta

          cst = timezone(timedelta(hours=8))
          now = datetime.now(cst).strftime('%Y-%m-%d %H:%M')

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Accept': 'application/json',
          }

          def et_to_cst(utc_str):
              try:
                  dt = datetime.fromisoformat(utc_str.replace('Z', '+00:00'))
                  return dt.astimezone(cst).strftime('%H:%M')
              except:
                  return ''

          def get_standings():
              """
              尝试多个数据源获取完整30支球队排名
              """
              # 方案1: NBA.com 官方 standings 页面数据
              try:
                  url = 'https://cdn.nba.com/static/json/liveData/standings/standings_conference.json'
                  r = requests.get(url, headers=headers, timeout=10)
                  print(f"NBA Conference Standings 状态码: {r.status_code}")
                  
                  if r.status_code == 200:
                      data = r.json()
                      ranking = {}
                      
                      # 处理东西部数据
                      for conf_key in ['east', 'west']:
                          if conf_key in data:
                              teams = data[conf_key]
                              for team in teams:
                                  team_id = str(team.get('teamId', ''))
                                  conf_rank = team.get('confRank', 99)
                                  if team_id and conf_rank != 99:
                                      ranking[team_id] = conf_rank
                      
                      if len(ranking) >= 28:
                          print(f"✅ NBA官方Conference积分榜加载成功，共 {len(ranking)} 支球队")
                          sorted_teams = sorted(ranking.items(), key=lambda x: x[1])
                          for team_id, rank in sorted_teams[:5]:
                              print(f"  teamId={team_id} rank={rank}")
                          return ranking
              except Exception as e:
                  print(f"⚠️ NBA Conference API失败: {e}")

              # 方案2: 尝试 playoffsBracket 数据
              try:
                  url = 'https://cdn.nba.com/static/json/liveData/playoffsBracket/playoffsBracket_00.json'
                  r = requests.get(url, headers=headers, timeout=10)
                  print(f"NBA Playoffs Bracket 状态码: {r.status_code}")
                  
                  if r.status_code == 200:
                      data = r.json()
                      ranking = {}
                      
                      # 从季后赛数据中提取排名
                      for series in data.get('series', []):
                          for team_key in ['topRow', 'bottomRow']:
                              team = series.get(team_key, {})
                              team_id = str(team.get('teamId', ''))
                              seed = team.get('seedNum', 99)
                              if team_id and seed != 99:
                                  ranking[team_id] = seed
                      
                      if len(ranking) >= 16:
                          print(f"✅ NBA季后赛种子排名加载成功，共 {len(ranking)} 支球队")
                          return ranking
              except Exception as e:
                  print(f"⚠️ NBA Playoffs Bracket API失败: {e}")

              # 方案3: 使用 balldontlie API (免费，无需key)
              try:
                  url = 'https://api.balldontlie.io/v1/standings'
                  params = {'season': 2024}
                  r = requests.get(url, headers=headers, params=params, timeout=10)
                  print(f"BallDontLie API 状态码: {r.status_code}")
                  
                  if r.status_code == 200:
                      data = r.json()
                      ranking = {}
                      
                      # BallDontLie 返回的数据结构
                      for team in data.get('data', []):
                          # 需要映射 team abbreviation 到 NBA teamId
                          pass  # 需要实现映射
              except Exception as e:
                  print(f"⚠️ BallDontLie API失败: {e}")

              # 方案4: 使用 sportsdata.io 的免费试用
              try:
                  url = 'https://api.sportsdata.io/v3/nba/scores/json/Standings/2025'
                  # 需要 API key，跳过
                  pass
              except:
                  pass

              # 方案5: 爬取 ESPN 完整页面（包含所有球队）
              try:
                  url = 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/standings'
                  params = {'season': 2025}
                  r = requests.get(url, headers=headers, params=params, timeout=10)
                  print(f"ESPN Full Standings 状态码: {r.status_code}")
                  
                  if r.status_code == 200:
                      data = r.json()
                      ranking = {}
                      
                      ESPN_TO_NBA_ID = {
                          'ATL': '1610612737', 'BOS': '1610612738', 'BKN': '1610612751',
                          'CHA': '1610612766', 'CHI': '1610612741', 'CLE': '1610612739',
                          'DAL': '1610612742', 'DEN': '1610612743', 'DET': '1610612765',
                          'GSW': '1610612744', 'HOU': '1610612745', 'IND': '1610612754',
                          'LAC': '1610612746', 'LAL': '1610612747', 'MEM': '1610612763',
                          'MIA': '1610612748', 'MIL': '1610612749', 'MIN': '1610612750',
                          'NOP': '1610612740', 'NYK': '1610612752', 'OKC': '1610612760',
                          'ORL': '1610612753', 'PHI': '1610612755', 'PHX': '1610612756',
                          'POR': '1610612757', 'SAC': '1610612758', 'SAS': '1610612759',
                          'TOR': '1610612761', 'UTA': '1610612762', 'WAS': '1610612764',
                      }
                      
                      # 尝试从完整standings中提取
                      for entry in data.get('standings', {}).get('entries', []):
                          team = entry.get('team', {})
                          abbr = team.get('abbreviation', '')
                          stats = entry.get('stats', [])
                          
                          # 查找 conferenceRank
                          conf_rank = None
                          for stat in stats:
                              if stat.get('name') == 'conferenceRank':
                                  conf_rank = stat.get('value')
                                  break
                          
                          nba_id = ESPN_TO_NBA_ID.get(abbr)
                          if nba_id and conf_rank:
                              ranking[nba_id] = int(conf_rank)
                      
                      if len(ranking) >= 28:
                          print(f"✅ ESPN完整积分榜加载成功，共 {len(ranking)} 支球队")
                          sorted_teams = sorted(ranking.items(), key=lambda x: x[1])
                          for team_id, rank in sorted_teams[:5]:
                              print(f"  teamId={team_id} rank={rank}")
                          return ranking
              except Exception as e:
                  print(f"⚠️ ESPN Full Standings失败: {e}")

              # 最后降级方案：ESPN 季后赛球队
              return get_standings_espn_fallback()

          def get_standings_espn_fallback():
              """
              降级方案：ESPN 季后赛球队（24支）
              """
              ESPN_TO_NBA_ID = {
                  'ATL': '1610612737', 'BOS': '1610612738', 'BKN': '1610612751',
                  'CHA': '1610612766', 'CHI': '1610612741', 'CLE': '1610612739',
                  'DAL': '1610612742', 'DEN': '1610612743', 'DET': '1610612765',
                  'GSW': '1610612744', 'HOU': '1610612745', 'IND': '1610612754',
                  'LAC': '1610612746', 'LAL': '1610612747', 'MEM': '1610612763',
                  'MIA': '1610612748', 'MIL': '1610612749', 'MIN': '1610612750',
                  'NOP': '1610612740', 'NYK': '1610612752', 'OKC': '1610612760',
                  'ORL': '1610612753', 'PHI': '1610612755', 'PHX': '1610612756',
                  'POR': '1610612757', 'SAC': '1610612758', 'SAS': '1610612759',
                  'TOR': '1610612761', 'UTA': '1610612762', 'WAS': '1610612764',
              }
              try:
                  url = 'https://site.web.api.espn.com/apis/v2/sports/basketball/nba/standings'
                  params = {'season': 2025, 'seasontype': 2}
                  r = requests.get(url, headers=headers, params=params, timeout=10)
                  print(f"ESPN积分榜状态码(降级): {r.status_code}")
                  
                  data = r.json()
                  ranking = {}
                  
                  for conf in data.get('children', []):
                      entries = conf.get('standings', {}).get('entries', [])
                      for i, entry in enumerate(entries, 1):
                          abbr = entry.get('team', {}).get('abbreviation', '')
                          nba_id = ESPN_TO_NBA_ID.get(abbr)
                          if nba_id:
                              ranking[nba_id] = i
                  
                  if ranking:
                      print(f"⚠️ 降级方案：ESPN积分榜加载成功，共 {len(ranking)} 支球队（仅季后赛球队）")
                      return ranking
                  return None
              except Exception as e:
                  print(f"❌ 所有数据源均失败: {e}")
                  return None

          def calc_hot_games(games, ranking):
              if ranking is None:
                  return set(), {}
              scored = []
              rank_info = {}
              for g in games:
                  away_id = str(g['awayTeam'].get('teamId', ''))
                  home_id = str(g['homeTeam'].get('teamId', ''))
                  r_away = ranking.get(away_id, 99)
                  r_home = ranking.get(home_id, 99)
                  
                  if r_away == 99 or r_home == 99:
                      score = 0
                  else:
                      score = (99 - r_away) + (99 - r_home)
                      if r_away <= 8 and r_home <= 8:
                          score += 10
                  
                  game_id = str(g['gameId'])
                  scored.append((score, game_id))
                  rank_info[game_id] = (r_away, r_home)
              
              scored.sort(key=lambda x: x[0], reverse=True)
              hot_ids = {gid for score, gid in scored[:2] if score > 0}
              return hot_ids, rank_info

          # ── 获取今日赛程 ──
          r = requests.get(
              'https://cdn.nba.com/static/json/liveData/scoreboard/todaysScoreboard_00.json',
              headers=headers, timeout=10
          )
          data = r.json()
          games = data.get('scoreboard', {}).get('games', [])
          game_date = data.get('scoreboard', {}).get('gameDate', '')

          ranking = get_standings()
          hot_ids, rank_info = calc_hot_games(games, ranking)
          use_rankings = ranking is not None

          finished, ongoing, upcoming = [], [], []

          for g in games:
              away = g['awayTeam']
              home = g['homeTeam']
              status = g.get('gameStatus', 1)
              status_txt = g.get('gameStatusText', '').strip()
              start_cst = et_to_cst(g.get('gameTimeUTC', ''))
              game_id = str(g['gameId'])
              is_hot = game_id in hot_ids
              r_away, r_home = rank_info.get(game_id, (99, 99))
              
              if use_rankings and r_away != 99 and r_home != 99:
                  rank_tag = f" `#{r_away} vs #{r_home}`"
              else:
                  rank_tag = ''

              info = {
                  'away': f"{away['teamCity']} {away['teamName']}",
                  'home': f"{home['teamCity']} {home['teamName']}",
                  'away_score': away.get('score', 0),
                  'home_score': home.get('score', 0),
                  'status_txt': status_txt,
                  'start_cst': start_cst,
                  'rank_tag': rank_tag,
                  'is_hot': is_hot,
              }
              if status == 3:
                  finished.append(info)
              elif status == 2:
                  ongoing.append(info)
              else:
                  upcoming.append(info)

          # ── Markdown 排版 ──
          sections = [f"**赛事日期:** {game_date}\n"]

          if ongoing:
              block = ['### 🔴 进行中\n']
              block.append('| 比赛（客场 @ 主场）| 比分 | 节次 |')
              block.append('|:---|:---:|:---:|')
              for g in ongoing:
                  hot = '🔥 ' if g['is_hot'] else ''
                  block.append(
                      f"| {hot}**{g['away']}** @ **{g['home']}**{g['rank_tag']} "
                      f"| {g['away_score']} - {g['home_score']} "
                      f"| {g['status_txt']} |"
                  )
              sections.append('\n'.join(block))

          if upcoming:
              block = ['### 🕐 今日待开赛\n']
              block.append('| 比赛（客场 @ 主场）| 开赛时间(北京) |')
              block.append('|:---|:---:|')
              for g in upcoming:
                  hot = '🔥 ' if g['is_hot'] else ''
                  time = g['start_cst'] if g['start_cst'] else '-'
                  block.append(
                      f"| {hot}**{g['away']}** @ **{g['home']}**{g['rank_tag']} "
                      f"| {time} |"
                  )
              sections.append('\n'.join(block))

          if finished:
              block = ['### ✅ 已结束\n']
              block.append('| 比赛（客场 @ 主场）| 比分 | 结果 |')
              block.append('|:---|:---:|:---:|')
              for g in finished:
                  hot = '🔥 ' if g['is_hot'] else ''
                  winner = g['away'] if g['away_score'] > g['home_score'] else g['home']
                  away_fmt = f"**{g['away']}**" if g['away'] == winner else g['away']
                  home_fmt = f"**{g['home']}**" if g['home'] == winner else g['home']
                  block.append(
                      f"| {hot}{away_fmt} @ {home_fmt}{g['rank_tag']} "
                      f"| {g['away_score']} - {g['home_score']} "
                      f"| 🏆 **{winner}** |"
                  )
              sections.append('\n'.join(block))

          if not games:
              sections.append('今日暂无比赛')

          if use_rankings and hot_ids:
              team_count = len(ranking) if ranking else 0
              sections.append(f'> 🔥 热门: 基于赛区排名计算（已获取 {team_count}/30 支球队排名）')
          elif not use_rankings:
              sections.append('> ⚠️ 积分榜数据暂不可用，本次不标注热门场次')

          desp = '\n\n'.join(sections)
          title = f'🏀 NBA 今日赛程 {now}'

          print(desp)

          key = os.environ.get('SERVERCHAN_KEY', '')
          if key:
              resp = requests.post(
                  f"https://sctapi.ftqq.com/{key}.send",
                  data={'title': title, 'desp': desp},
                  timeout=10
              )
              print("推送结果:", resp.json())
          else:
              print("未设置 SERVERCHAN_KEY，跳过推送")
          EOF
