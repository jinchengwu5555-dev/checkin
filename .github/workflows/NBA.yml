name: Test NBA Push

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Fetch NBA & Push
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: |
          python3 - << 'EOF'
          import requests, os
          from datetime import datetime, timezone, timedelta

          cst = timezone(timedelta(hours=8))
          now = datetime.now(cst).strftime('%Y-%m-%d %H:%M')

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Accept': 'application/json',
              'x-nba-stats-origin': 'stats',
              'x-nba-stats-token': 'true',
              'Referer': 'https://www.nba.com/',
          }

          def et_to_cst(utc_str):
              try:
                  dt = datetime.fromisoformat(utc_str.replace('Z', '+00:00'))
                  return dt.astimezone(cst).strftime('%H:%M')
              except:
                  return ''

          def get_standings():
              """获取积分榜排名，失败返回 None"""
              try:
                  url = 'https://stats.nba.com/stats/leaguestandingsv3?LeagueID=00&Season=2025-26&SeasonType=Regular+Season'
                  r = requests.get(url, headers=headers, timeout=10)
                  data     = r.json()
                  rows     = data['resultSets'][0]['rowSet']
                  headers_ = data['resultSets'][0]['headers']
                  tid_idx  = headers_.index('TeamID')
                  rnk_idx  = headers_.index('PlayoffRank')
                  ranking  = {str(row[tid_idx]): int(row[rnk_idx]) for row in rows}
                  print(f"✅ 积分榜加载成功，共 {len(ranking)} 支球队")
                  return ranking
              except Exception as e:
                  print(f"⚠️ 积分榜获取失败: {e}")
                  return None  # 明确返回 None 表示失败

          def calc_hot_games(games, ranking):
              """
              热门判断规则:
              - 两队积分榜排名之和越小越热门
              - 双方都在前8（季后赛区）额外 +5 分
              - 最多标注 2 场
              - 积分榜不可用时不标注任何热门
              """
              if ranking is None:
                  return set(), {}  # 积分榜失败，不标注热门

              scored = []
              rank_info = {}

              for g in games:
                  away_id = str(g['awayTeam'].get('teamId', ''))
                  home_id = str(g['homeTeam'].get('teamId', ''))
                  r_away  = ranking.get(away_id, 99)
                  r_home  = ranking.get(home_id, 99)
                  score   = (99 - r_away) + (99 - r_home)
                  if r_away <= 8 and r_home <= 8:
                      score += 5
                  game_id = str(g['gameId'])
                  scored.append((score, game_id))
                  rank_info[game_id] = (r_away, r_home)

              scored.sort(key=lambda x: x[0], reverse=True)
              hot_ids = {gid for _, gid in scored[:2]}
              return hot_ids, rank_info

          # ── 获取今日赛程 ──
          r = requests.get(
              'https://cdn.nba.com/static/json/liveData/scoreboard/todaysScoreboard_00.json',
              headers=headers, timeout=10
          )
          data      = r.json()
          games     = data.get('scoreboard', {}).get('games', [])
          game_date = data.get('scoreboard', {}).get('gameDate', '')

          ranking              = get_standings()
          hot_ids, rank_info   = calc_hot_games(games, ranking)
          use_rankings         = ranking is not None

          finished, ongoing, upcoming = [], [], []

          for g in games:
              away       = g['awayTeam']
              home       = g['homeTeam']
              status     = g.get('gameStatus', 1)
              status_txt = g.get('gameStatusText', '').strip()
              start_cst  = et_to_cst(g.get('gameTimeUTC', ''))
              game_id    = str(g['gameId'])
              is_hot     = game_id in hot_ids

              r_away, r_home = rank_info.get(game_id, (99, 99))
              rank_tag = f" `#{r_away} vs #{r_home}`" if use_rankings else ''

              info = {
                  'away':       f"{away['teamCity']} {away['teamName']}",
                  'home':       f"{home['teamCity']} {home['teamName']}",
                  'away_score': away.get('score', 0),
                  'home_score': home.get('score', 0),
                  'status_txt': status_txt,
                  'start_cst':  start_cst,
                  'rank_tag':   rank_tag,
                  'is_hot':     is_hot,
              }

              if status == 3:
                  finished.append(info)
              elif status == 2:
                  ongoing.append(info)
              else:
                  upcoming.append(info)

          # ── Markdown 排版 ──
          sections = [f"**赛事日期:** {game_date}\n"]

          if ongoing:
              block = ['### 🔴 进行中\n']
              block.append('| 比赛 | 比分 | 节次 |')
              block.append('|:---|:---:|:---:|')
              for g in ongoing:
                  hot  = '🔥 ' if g['is_hot'] else ''
                  block.append(
                      f"| {hot}**{g['away']}** vs **{g['home']}**{g['rank_tag']} "
                      f"| **{g['away_score']} - {g['home_score']}** "
                      f"| {g['status_txt']} |"
                  )
              sections.append('\n'.join(block))

          if upcoming:
              block = ['### 🕐 今日待开赛\n']
              block.append('| 比赛 | 开赛时间(北京) |')
              block.append('|:---|:---:|')
              for g in upcoming:
                  hot  = '🔥 ' if g['is_hot'] else ''
                  time = g['start_cst'] if g['start_cst'] else '-'
                  block.append(
                      f"| {hot}**{g['away']}** vs **{g['home']}**{g['rank_tag']} "
                      f"| {time} |"
                  )
              sections.append('\n'.join(block))

          if finished:
              block = ['### ✅ 已结束\n']
              block.append('| 比赛 | 比分 | 结果 |')
              block.append('|:---|:---:|:---:|')
              for g in finished:
                  hot    = '🔥 ' if g['is_hot'] else ''
                  winner = g['away'] if g['away_score'] > g['home_score'] else g['home']
                  block.append(
                      f"| {hot}**{g['away']}** vs **{g['home']}**{g['rank_tag']} "
                      f"| **{g['away_score']} - {g['home_score']}** "
                      f"| 🏆 {winner} |"
                  )
              sections.append('\n'.join(block))

          if not games:
              sections.append('今日暂无比赛')

          # 底部说明
          if use_rankings and hot_ids:
              sections.append('> 🔥 热门: 两队积分榜排名之和最小的前2场，双强对决（双方均前8）额外加权')
          elif not use_rankings:
              sections.append('> ⚠️ 积分榜数据暂不可用，本次不标注热门场次')

          desp  = '\n\n'.join(sections)
          title = f'🏀 NBA 今日赛程 {now}'

          print(desp)

          key = os.environ.get('SERVERCHAN_KEY', '')
          if key:
              resp = requests.post(
                  f"https://sctapi.ftqq.com/{key}.send",
                  data={'title': title, 'desp': desp},
                  timeout=10
              )
              print("推送结果:", resp.json())
          else:
              print("未设置 SERVERCHAN_KEY，跳过推送")
          EOF
