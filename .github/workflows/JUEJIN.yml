name: Juejin Auto Helper

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  juejin_task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Script
        env:
          JUEJIN_COOKIES: ${{ secrets.JUEJIN_COOKIES }} 
          PUSH_KEY: ${{ secrets.PUSH_KEY }}
        run: |
          npm install axios
          
          cat << 'EOF' > index.js
          const axios = require('axios');

          // --- 核心配置 ---
          // 2608 是掘金 Web 端的固定 aid，缺少它会导致 404
          const PARAMS = '?aid=2608&uuid='; 
          const cookies = process.env.JUEJIN_COOKIES ? process.env.JUEJIN_COOKIES.split('#') : [];
          const pushKey = process.env.PUSH_KEY;

          async function runTask(cookie) {
            const instance = axios.create({ 
              baseURL: 'https://api.juejin.cn',
              headers: { 
                'Cookie': cookie,
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
                'Origin': 'https://juejin.cn',
                'Referer': 'https://juejin.cn/',
                'Content-Type': 'application/json'
              }
            });

            let report = [];
            try {
              // 1. 签到
              const checkIn = await instance.post(`/growth_api/v1/check_in${PARAMS}`);
              if (checkIn.data.err_no === 0) {
                report.push(`✅ 签到成功: +${checkIn.data.data.incr_point} 矿石`);
              } else {
                report.push(`ℹ️ 签到提示: ${checkIn.data.err_msg || '可能已签到'}`);
              }

              // 2. 获取抽奖配置 (改用 growth_api 路径)
              const config = await instance.get(`/growth_api/v1/lottery_config/get${PARAMS}`);
              if (config.data.err_no === 0 && config.data.data.free_count > 0) {
                // 3. 免费抽奖
                const draw = await instance.post(`/growth_api/v1/lottery/draw${PARAMS}`);
                if (draw.data.err_no === 0) {
                  report.push(`🎁 抽奖结果: ${draw.data.data.lottery_name}`);
                }
              } else {
                report.push("🎫 今日无免费抽奖机会");
              }

              // 4. 沾喜气 (ID 会动态变化，这里做了容错)
              const luckyList = await instance.post(`/growth_api/v1/lottery_history/global_big${PARAMS}`, { page_no: 1, page_size: 1 });
              const historyId = luckyList.data?.data?.lotteries?.[0]?.history_id;
              if (historyId) {
                const dipRes = await instance.post(`/growth_api/v1/lottery_lucky/dip_lucky${PARAMS}`, { lottery_history_id: historyId });
                report.push(dipRes.data.err_no === 0 ? "✨ 沾喜气成功" : "✨ 今日已沾过");
              }

            } catch (err) {
              console.error(err);
              report.push(`❌ 运行异常: ${err.response?.status || err.message}`);
            }
            return report.join('\n');
          }

          async function main() {
            if (cookies.length === 0) return console.error("未找到 Cookie");

            let summary = ["【掘金自动化助手报告】"];
            for (let i = 0; i < cookies.length; i++) {
              console.log(`正在处理第 ${i+1} 个账号...`);
              const res = await runTask(cookies[i]);
              summary.push(`--- 账号 ${i+1} ---\n${res}`);
            }

            const msg = summary.join('\n\n');
            console.log(msg);

            if (pushKey) {
              const url = `https://api.day.app/${pushKey}/${encodeURIComponent('掘金报告')}/${encodeURIComponent(msg)}?isArchive=1`;
              await axios.get(url).catch(e => console.error("通知发送失败"));
            }
          }

          main();
          EOF

          node index.js
