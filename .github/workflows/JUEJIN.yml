name: Juejin Checkin
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'  # 每天北京时间 12:00 (UTC+8)

jobs:
  checkin:
    runs-on: ubuntu-latest
    environment: user
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Create checkin script
        run: |
          cat > juejin_checkin.py << 'EOF'
          import os
          import requests
          import json

          class JuejinCheckin:
              def __init__(self, cookie):
                  self.cookie = cookie
                  self.headers = {
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                      'Cookie': cookie,
                      'Content-Type': 'application/json'
                  }
                  self.base_url = 'https://api.juejin.cn'

              def get_user_info(self):
                  """获取用户信息"""
                  try:
                      url = f'{self.base_url}/user_api/v1/user/get'
                      r = requests.get(url, headers=self.headers, timeout=10)
                      data = r.json()
                      
                      if data.get('err_no') == 0:
                          user_name = data['data']['user_name']
                          print(f'用户: {user_name}')
                          return True
                      else:
                          print(f'获取用户信息失败: {data.get("err_msg")}')
                          return False
                  except Exception as e:
                      print(f'获取用户信息异常: {e}')
                      return False

              def check_in(self):
                  """签到"""
                  try:
                      url = f'{self.base_url}/growth_api/v1/check_in'
                      r = requests.post(url, headers=self.headers, timeout=10)
                      data = r.json()
                      
                      if data.get('err_no') == 0:
                          print('签到成功')
                          return True
                      elif data.get('err_msg') == '已签到':
                          print('今日已签到')
                          return True
                      else:
                          print(f'签到失败: {data.get("err_msg")}')
                          return False
                  except Exception as e:
                      print(f'签到异常: {e}')
                      return False

              def draw_lottery(self):
                  """抽奖"""
                  try:
                      url = f'{self.base_url}/growth_api/v1/lottery/draw'
                      r = requests.post(url, headers=self.headers, timeout=10)
                      data = r.json()
                      
                      if data.get('err_no') == 0:
                          lottery_name = data['data'].get('lottery_name', '未知奖品')
                          print(f'抽奖成功: {lottery_name}')
                          return True
                      else:
                          print(f'抽奖: {data.get("err_msg")}')
                          return False
                  except Exception as e:
                      print(f'抽奖异常: {e}')
                      return False

              def get_lottery_config(self):
                  """获取抽奖配置（查看免费抽奖次数）"""
                  try:
                      url = f'{self.base_url}/growth_api/v1/lottery_config/get'
                      r = requests.get(url, headers=self.headers, timeout=10)
                      data = r.json()
                      
                      if data.get('err_no') == 0:
                          free_count = data['data'].get('free_count', 0)
                          print(f'剩余免费抽奖次数: {free_count}')
                          return free_count
                      return 0
                  except Exception as e:
                      print(f'获取抽奖配置异常: {e}')
                      return 0

              def get_current_point(self):
                  """获取当前矿石数"""
                  try:
                      url = f'{self.base_url}/growth_api/v1/get_cur_point'
                      r = requests.get(url, headers=self.headers, timeout=10)
                      data = r.json()
                      
                      if data.get('err_no') == 0:
                          point = data['data']
                          print(f'当前矿石数: {point}')
                          return point
                      return 0
                  except Exception as e:
                      print(f'获取矿石数异常: {e}')
                      return 0

              def dip_lucky(self, lottery_id='7378696901093163067'):
                  """沾喜气（从其他用户那里获取幸运值）"""
                  try:
                      url = f'{self.base_url}/growth_api/v1/lottery_lucky/dip_lucky'
                      payload = {'lottery_history_id': lottery_id}
                      r = requests.post(url, headers=self.headers, json=payload, timeout=10)
                      data = r.json()
                      
                      if data.get('err_no') == 0:
                          dip_value = data['data'].get('dip_value', 0)
                          print(f'沾喜气成功: +{dip_value} 幸运值')
                          return True
                      else:
                          print(f'沾喜气: {data.get("err_msg")}')
                          return False
                  except Exception as e:
                      print(f'沾喜气异常: {e}')
                      return False

              def run(self):
                  """执行所有任务"""
                  print('=' * 50)
                  print('开始 掘金 签到任务')
                  print('=' * 50)
                  
                  # 验证登录
                  if not self.get_user_info():
                      print('Cookie 无效，请更新')
                      return False
                  
                  # 签到
                  print('\n--- 每日签到 ---')
                  self.check_in()
                  
                  # 查看矿石数
                  print('\n--- 矿石统计 ---')
                  self.get_current_point()
                  
                  # 抽奖
                  print('\n--- 免费抽奖 ---')
                  free_count = self.get_lottery_config()
                  
                  if free_count > 0:
                      for i in range(free_count):
                          print(f'\n第 {i+1} 次抽奖:')
                          self.draw_lottery()
                  
                  # 沾喜气
                  print('\n--- 沾喜气 ---')
                  self.dip_lucky()
                  
                  print('\n' + '=' * 50)
                  print('签到任务完成')
                  print('=' * 50)
                  return True

          if __name__ == '__main__':
              cookie = os.environ.get('JUEJIN_COOKIE')
              
              if not cookie:
                  print('未设置 JUEJIN_COOKIE')
                  exit(1)
              
              juejin = JuejinCheckin(cookie)
              success = juejin.run()
              
              if not success:
                  exit(1)
          EOF

      - name: Run checkin
        env:
          JUEJIN_COOKIE: ${{ secrets.JUEJIN_COOKIE }}
        run: |
          python juejin_checkin.py
