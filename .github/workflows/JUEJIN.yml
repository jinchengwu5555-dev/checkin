name: Juejin & Cloud Automation

on:
  schedule:
    # 每天北京/槟城时间 08:30 自动执行 (UTC 00:30)
    - cron: '30 0 * * *'
  workflow_dispatch: # 支持手动点击按钮执行

jobs:
  automation_task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Scripts
        env:
          # 在 GitHub Settings -> Secrets -> Actions 中添加这两个变量
          JUEJIN_COOKIES: ${{ secrets.JUEJIN_COOKIES }}
          PUSH_KEY: ${{ secrets.PUSH_KEY }}
        run: |
          npm install axios
          
          cat << 'EOF' > index.js
          const axios = require('axios');

          // --- 基础配置 ---
          const PARAMS = '?aid=2608&uuid='; // 掘金Web端必须带上的aid参数
          const juejinCookies = process.env.JUEJIN_COOKIES ? process.env.JUEJIN_COOKIES.split('#') : [];
          const pushKey = process.env.PUSH_KEY;
          let finalReports = ["🚀 自动化执行报告 (" + new Date().toLocaleString() + ")"];

          /**
           * 掘金助手逻辑
           */
          async function juejinTask(cookie, index) {
            const api = axios.create({
              baseURL: 'https://api.juejin.cn',
              headers: {
                'Cookie': cookie,
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
                'Origin': 'https://juejin.cn',
                'Referer': 'https://juejin.cn/',
                'Content-Type': 'application/json'
              }
            });

            let logs = [`【账号 ${index + 1} 掘金结果】`];

            try {
              // 1. 签到 (必须发送空对象 {} 作为 Body)
              const checkInRes = await api.post(`/growth_api/v1/check_in${PARAMS}`, {});
              if (checkInRes.data.err_no === 0) {
                logs.push(`✅ 签到成功: +${checkInRes.data.data.incr_point} 矿石`);
              } else if (checkInRes.data.err_no === 20001) {
                logs.push(`ℹ️ 签到提示: 今日已签到`);
              } else {
                logs.push(`❌ 签到失败: ${checkInRes.data.err_msg}`);
              }

              // 2. 免费抽奖
              const configRes = await api.get(`/growth_api/v1/lottery_config/get${PARAMS}`);
              if (configRes.data.err_no === 0 && configRes.data.data.free_count > 0) {
                const drawRes = await api.post(`/growth_api/v1/lottery/draw${PARAMS}`, {});
                if (drawRes.data.err_no === 0) {
                  logs.push(`🎁 抽奖成功: ${drawRes.data.data.lottery_name}`);
                }
              } else {
                logs.push(`🎫 抽奖提示: 今日无免费机会`);
              }

              // 3. 沾喜气 (动态获取历史ID)
              const historyRes = await api.post(`/growth_api/v1/lottery_history/global_big${PARAMS}`, {});
              const historyId = historyRes.data?.data?.lotteries?.[0]?.history_id;
              if (historyId) {
                const dipRes = await api.post(`/growth_api/v1/lottery_lucky/dip_lucky${PARAMS}`, { lottery_history_id: historyId });
                if (dipRes.data.err_no === 0) {
                  logs.push(`✨ 沾喜气成功: +${dipRes.data.data.dip_value} 点`);
                } else {
                  logs.push(`✨ 沾喜气: ${dipRes.data.err_msg}`);
                }
              }

            } catch (err) {
              logs.push(`⚠️ 运行异常: ${err.message}`);
            }
            return logs.join('\n');
          }

          /**
           * 主程序入口
           */
          async function main() {
            // 执行掘金任务
            if (juejinCookies.length > 0) {
              for (let i = 0; i < juejinCookies.length; i++) {
                const result = await juejinTask(juejinCookies[i], i);
                finalReports.push(result);
              }
