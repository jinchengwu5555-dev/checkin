name: Juejin Checkin
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  checkin:
    runs-on: ubuntu-latest
    environment: user
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install axios tough-cookie

      - name: Create checkin script
        run: |
          cat > juejin_checkin.js << 'EOF'
          const axios = require('axios');
          const { CookieJar } = require('tough-cookie');
          const { wrapper } = require('axios-cookiejar-support');

          class JuejinHelper {
            constructor(cookie) {
              this.cookie = cookie;
              this.client = wrapper(axios.create({
                baseURL: 'https://api.juejin.cn',
                headers: {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                  'Cookie': cookie,
                  'Content-Type': 'application/json',
                  'Origin': 'https://juejin.cn',
                  'Referer': 'https://juejin.cn/'
                },
                timeout: 10000
              }));
            }

            async getCurrentUser() {
              try {
                const res = await this.client.get('/user_api/v1/user/get');
                if (res.data.err_no === 0) {
                  console.log(`用户: ${res.data.data.user_name}`);
                  return res.data.data;
                }
                return null;
              } catch (e) {
                console.error('获取用户信息失败:', e.message);
                return null;
              }
            }

            async checkIn() {
              try {
                const res = await this.client.post('/growth_api/v1/check_in');
                if (res.data.err_no === 0) {
                  console.log('签到成功');
                  return true;
                } else if (res.data.err_msg && res.data.err_msg.includes('已签到')) {
                  console.log('今日已签到');
                  return true;
                } else {
                  console.log(`签到失败: ${res.data.err_msg || '未知错误'}`);
                  return false;
                }
              } catch (e) {
                console.error('签到异常:', e.message);
                return false;
              }
            }

            async getLotteryConfig() {
              try {
                const res = await this.client.get('/growth_api/v1/lottery_config/get');
                if (res.data.err_no === 0) {
                  const freeCount = res.data.data.free_count || 0;
                  console.log(`免费抽奖次数: ${freeCount}`);
                  return freeCount;
                }
                return 0;
              } catch (e) {
                console.error('获取抽奖配置失败:', e.message);
                return 0;
              }
            }

            async draw() {
              try {
                const res = await this.client.post('/growth_api/v1/lottery/draw');
                if (res.data.err_no === 0) {
                  const lotteryName = res.data.data.lottery_name || '未知奖品';
                  console.log(`抽奖成功: ${lotteryName}`);
                  return true;
                } else {
                  console.log(`抽奖: ${res.data.err_msg || '未知错误'}`);
                  return false;
                }
              } catch (e) {
                console.error('抽奖异常:', e.message);
                return false;
              }
            }

            async getCurPoint() {
              try {
                const res = await this.client.get('/growth_api/v1/get_cur_point');
                if (res.data.err_no === 0) {
                  console.log(`当前矿石: ${res.data.data}`);
                  return res.data.data;
                }
                return 0;
              } catch (e) {
                console.error('获取矿石失败:', e.message);
                return 0;
              }
            }

            async run() {
              console.log('='.repeat(50));
              console.log('开始 掘金 签到任务');
              console.log('='.repeat(50));

              const user = await this.getCurrentUser();
              if (!user) {
                console.log('Cookie 无效，请更新');
                return false;
              }

              console.log('\n--- 每日签到 ---');
              await this.checkIn();

              console.log('\n--- 矿石统计 ---');
              await this.getCurPoint();

              console.log('\n--- 免费抽奖 ---');
              const freeCount = await this.getLotteryConfig();
              if (freeCount > 0) {
                for (let i = 0; i < freeCount; i++) {
                  console.log(`\n第 ${i + 1} 次抽奖:`);
                  await this.draw();
                  await new Promise(resolve => setTimeout(resolve, 1000));
                }
              }

              console.log('\n' + '='.repeat(50));
              console.log('签到任务完成');
              console.log('='.repeat(50));
              return true;
            }
          }

          const cookie = process.env.JUEJIN_COOKIE;
          if (!cookie) {
            console.log('未设置 JUEJIN_COOKIE');
            process.exit(1);
          }

          const helper = new JuejinHelper(cookie);
          helper.run().catch(err => {
            console.error('执行失败:', err);
            process.exit(1);
          });
          EOF

      - name: Run checkin
        env:
          JUEJIN_COOKIE: ${{ secrets.JUEJIN_COOKIE }}
        run: |
          node juejin_checkin.js
