name: Exchange Rates

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      result:
        description: "汇率信息"
        value: ${{ jobs.fetch.outputs.result }}

jobs:
  fetch:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.fetch.outputs.result }}

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Exchange Rates
        id: fetch
        run: |
          python3 - << 'EOF'
          import requests, os
          from datetime import datetime, timezone, timedelta

          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M')
          lines = [f'### 💱 今日汇率  {now}\n']

          try:
              r = requests.get('https://open.er-api.com/v6/latest/CNY', timeout=10)
              rates = r.json().get('rates', {})

              def to_cny(code):
                  rate = rates.get(code)
                  return round(1 / rate, 4) if rate else None

              lines.append('| 货币 | 1 外币 → 人民币 |')
              lines.append('|:---|:---:|')
              for code, name, flag in [('MYR','马币','🇲🇾'),('USD','美元','🇺🇸'),('EUR','欧元','🇪🇺'),('SGD','新币','🇸🇬')]:
                  val = to_cny(code)
                  if val:
                      lines.append(f"| {flag} {name} | **{val}** 元 |")

              lines.append('\n| 货币 | 1 人民币 → 外币 |')
              lines.append('|:---|:---:|')
              for code, name, flag in [('JPY','日元','🇯🇵'),('KRW','韩元','🇰🇷'),('HKD','港元','🇭🇰')]:
                  rate = rates.get(code)
                  if rate:
                      lines.append(f"| {flag} {name} | **{round(rate, 4)}** |")

          except Exception as e:
              lines.append(f"\n⚠️ 获取失败: {e}")

          result = '\n'.join(lines)
          print(result)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"result<<ENDEXCHANGE\n{result}\nENDEXCHANGE\n")
          EOF
